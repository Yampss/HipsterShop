---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.mongodb.rootSecretName }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: mongodb
    app.kubernetes.io/component: database
type: Opaque
stringData:
  {{ .Values.mongodb.rootUsernameKey }}: {{ .Values.mongodb.rootUsername | quote }}
  {{ .Values.mongodb.rootPasswordKey }}: {{ .Values.mongodb.rootPassword | quote }}

---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.mongodb.appSecretName }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: mongodb
    app.kubernetes.io/component: database
type: Opaque
stringData:
  {{ .Values.mongodb.authUsernameKey }}: auth_user
  {{ .Values.mongodb.authPasswordKey }}: auth_password
  {{ .Values.mongodb.cartUsernameKey }}: cart_user
  {{ .Values.mongodb.cartPasswordKey }}: cart_password
  {{ .Values.mongodb.catalogUsernameKey }}: catalog_user
  {{ .Values.mongodb.catalogPasswordKey }}: catalog_password
  {{ .Values.mongodb.orderUsernameKey }}: order_user
  {{ .Values.mongodb.orderPasswordKey }}: order_password
  {{ .Values.mongodb.paymentUsernameKey }}: payment_user
  {{ .Values.mongodb.paymentPasswordKey }}: payment_password
  {{ .Values.mongodb.notificationUsernameKey }}: notification_user
  {{ .Values.mongodb.notificationPasswordKey }}: notification_password
  {{ .Values.mongodb.analyticsUsernameKey }}: analytics_user
  {{ .Values.mongodb.analyticsPasswordKey }}: analytics_password

---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.appSecrets.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: hipster-shop
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  JWT_SECRET: {{ .Values.secrets.appSecrets.jwtSecret | quote }}
  {{- if .Values.secrets.appSecrets.geminiApiKey }}
  GEMINI_API_KEY: {{ .Values.secrets.appSecrets.geminiApiKey | quote }}
  {{- end }}

