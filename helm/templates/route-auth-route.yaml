apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.routes.auth.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.authservice.name }}
    app.kubernetes.io/name: hipster-shop
    app.kubernetes.io/component: route
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}

  rules:
    {{- range .Values.routes.auth.endpoints }}
    - matches:
        - path:
            type: Exact
            value: {{ .path }}

      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplaceFullPath
              replaceFullPath: {{ .rewrite }}

      backendRefs:
        - name: {{ $.Values.authservice.name }}
          port: {{ $.Values.authservice.service.port }}
    {{- end }}

