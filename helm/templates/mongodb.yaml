---
apiVersion: v1
kind: Service
metadata:
  namespace: {{ .Values.namespace }}
  name: {{ .Values.mongodb.headlessServiceName }}
  labels:
    app: mongodb
spec:
  clusterIP: None
  selector:
    app: mongodb
  ports:
  - name: mongo
    port: 27017
    targetPort: 27017

---
apiVersion: v1
kind: Service
metadata:
  namespace: {{ .Values.namespace }}
  name: {{ .Values.mongodb.serviceName }}
  labels:
    app: mongodb
spec:
  type: ClusterIP
  selector:
    app: mongodb
  ports:
  - name: mongo
    port: 27017
    targetPort: 27017

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  namespace: {{ .Values.namespace }}
  name: {{ .Values.mongodb.serviceName }}
  labels:
    app: {{ .Values.mongodb.serviceName }}
spec:
  serviceName: {{ .Values.mongodb.headlessServiceName }}
  replicas: {{ .Values.mongodb.replicas }}
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      terminationGracePeriodSeconds: 30
      containers:
      - name: mongodb
        image: {{ .Values.mongodb.image }}
        imagePullPolicy: {{ .Values.mongodb.imagePullPolicy }}
        command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
        ports:
        - containerPort: 27017
          name: mongo
        env:
        - name: MONGO_INITDB_ROOT_USERNAME
          valueFrom:
            secretKeyRef:
              name: {{ .Values.mongodb.rootSecretName }}
              key: {{ .Values.mongodb.rootUsernameKey }}
        - name: MONGO_INITDB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.mongodb.rootSecretName }}
              key: {{ .Values.mongodb.rootPasswordKey }}
        - name: MONGO_INITDB_DATABASE
          value: {{ .Values.mongodb.initDatabase | quote }}
        volumeMounts:
        - name: mongo-data
          mountPath: /data/db
        readinessProbe:
          exec:
            command:
            - mongosh
            - --eval
            - "db.adminCommand('ping')"
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 5
        livenessProbe:
          exec:
            command:
            - mongosh
            - --eval
            - "db.adminCommand('ping')"
          initialDelaySeconds: 30
          periodSeconds: 20
          timeoutSeconds: 5
        resources:
          requests:
            cpu: {{ .Values.mongodb.resources.requests.cpu }}
            memory: {{ .Values.mongodb.resources.requests.memory }}
          limits:
            cpu: {{ .Values.mongodb.resources.limits.cpu }}
            memory: {{ .Values.mongodb.resources.limits.memory }}
  volumeClaimTemplates:
  - metadata:
      name: mongo-data
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: {{ .Values.mongodb.storageClass }}
      resources:
        requests:
          storage: {{ .Values.mongodb.storage }}

---
apiVersion: batch/v1
kind: Job
metadata:
  namespace: {{ .Values.namespace }}
  name: {{ .Values.mongodb.initJobName }}
  labels:
    app: mongodb
spec:
  backoffLimit: 10
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      restartPolicy: OnFailure
      containers:
      - name: mongo-init
        image: mongo:7.0
        imagePullPolicy: {{ .Values.mongodb.imagePullPolicy }}
        env:
        - name: MONGO_ROOT_USERNAME
          valueFrom:
            secretKeyRef:
              name: {{ .Values.mongodb.rootSecretName }}
              key: {{ .Values.mongodb.rootUsernameKey }}
        - name: MONGO_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.mongodb.rootSecretName }}
              key: {{ .Values.mongodb.rootPasswordKey }}
        - name: MONGODB_HEADLESS_SERVICE
          value: "{{ .Values.mongodb.headlessServiceName }}.{{ .Values.namespace }}.svc.cluster.local"
        - name: MONGODB_REPLICA_SET
          value: "{{ .Values.mongodbReplicaSet }}"
        command:
        - bash
        - -c
        - |
          set -e
          echo "MongoDB initialization complete!"
