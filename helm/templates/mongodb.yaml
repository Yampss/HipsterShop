---
apiVersion: v1
kind: Service
metadata:
  namespace: {{ .Values.namespace }}
  name: {{ .Values.mongodb.headlessServiceName }}
  labels:
    app: mongodb
spec:
  clusterIP: None
  selector:
    app: mongodb
  ports:
  - name: mongo
    port: 27017
    targetPort: 27017

---
apiVersion: v1
kind: Service
metadata:
  namespace: {{ .Values.namespace }}
  name: {{ .Values.mongodb.serviceName }}
  labels:
    app: mongodb
spec:
  type: ClusterIP
  selector:
    app: mongodb
  ports:
  - name: mongo
    port: 27017
    targetPort: 27017

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  namespace: {{ .Values.namespace }}
  name: {{ .Values.mongodb.serviceName }}
  labels:
    app: {{ .Values.mongodb.serviceName }}
spec:
  serviceName: {{ .Values.mongodb.headlessServiceName }}
  replicas: {{ .Values.mongodb.replicas }}
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      terminationGracePeriodSeconds: 30
      containers:
      - name: mongodb
        image: {{ .Values.mongodb.image }}
        imagePullPolicy: {{ .Values.mongodb.imagePullPolicy }}
        command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
        ports:
        - containerPort: 27017
          name: mongo
        env:
        - name: MONGO_INITDB_ROOT_USERNAME
          valueFrom:
            secretKeyRef:
              name: {{ .Values.mongodb.rootSecretName }}
              key: {{ .Values.mongodb.rootUsernameKey }}
        - name: MONGO_INITDB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.mongodb.rootSecretName }}
              key: {{ .Values.mongodb.rootPasswordKey }}
        - name: MONGO_INITDB_DATABASE
          value: {{ .Values.mongodb.initDatabase | quote }}
        volumeMounts:
        - name: mongo-data
          mountPath: /data/db
        readinessProbe:
          exec:
            command:
            - mongosh
            - --eval
            - "db.adminCommand('ping')"
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 5
        livenessProbe:
          exec:
            command:
            - mongosh
            - --eval
            - "db.adminCommand('ping')"
          initialDelaySeconds: 30
          periodSeconds: 20
          timeoutSeconds: 5
        resources:
          requests:
            cpu: {{ .Values.mongodb.resources.requests.cpu }}
            memory: {{ .Values.mongodb.resources.requests.memory }}
          limits:
            cpu: {{ .Values.mongodb.resources.limits.cpu }}
            memory: {{ .Values.mongodb.resources.limits.memory }}
  volumeClaimTemplates:
  - metadata:
      name: mongo-data
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: {{ .Values.mongodb.storageClass }}
      resources:
        requests:
          storage: {{ .Values.mongodb.storage }}

---
apiVersion: batch/v1
kind: Job
metadata:
  namespace: {{ .Values.namespace }}
  name: mongo-init-replicaset
  labels:
    app: mongodb
spec:
  backoffLimit: 10
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: mongo-init
        image: mongo:7.0
        imagePullPolicy: {{ .Values.mongodb.imagePullPolicy }}
        env:
        - name: MONGO_ROOT_USERNAME
          valueFrom:
            secretKeyRef:
              name: mongodb-root
              key: MONGO_ROOT_USERNAME
        - name: MONGO_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mongodb-root
              key: MONGO_ROOT_PASSWORD
        - name: AUTH_MONGO_USERNAME
          valueFrom:
            secretKeyRef:
              name: mongodb-users
              key: AUTH_MONGO_USERNAME
        - name: AUTH_MONGO_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mongodb-users
              key: AUTH_MONGO_PASSWORD
        - name: CART_MONGO_USERNAME
          valueFrom:
            secretKeyRef:
              name: mongodb-users
              key: CART_MONGO_USERNAME
        - name: CART_MONGO_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mongodb-users
              key: CART_MONGO_PASSWORD
        - name: CATALOG_MONGO_USERNAME
          valueFrom:
            secretKeyRef:
              name: mongodb-users
              key: CATALOG_MONGO_USERNAME
        - name: CATALOG_MONGO_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mongodb-users
              key: CATALOG_MONGO_PASSWORD
        - name: ORDER_MONGO_USERNAME
          valueFrom:
            secretKeyRef:
              name: mongodb-users
              key: ORDER_MONGO_USERNAME
        - name: ORDER_MONGO_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mongodb-users
              key: ORDER_MONGO_PASSWORD
        - name: PAYMENT_MONGO_USERNAME
          valueFrom:
            secretKeyRef:
              name: mongodb-users
              key: PAYMENT_MONGO_USERNAME
        - name: PAYMENT_MONGO_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mongodb-users
              key: PAYMENT_MONGO_PASSWORD
        - name: NOTIFICATION_MONGO_USERNAME
          valueFrom:
            secretKeyRef:
              name: mongodb-users
              key: NOTIFICATION_MONGO_USERNAME
        - name: NOTIFICATION_MONGO_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mongodb-users
              key: NOTIFICATION_MONGO_PASSWORD
        - name: ANALYTICS_MONGO_USERNAME
          valueFrom:
            secretKeyRef:
              name: mongodb-users
              key: ANALYTICS_MONGO_USERNAME
        - name: ANALYTICS_MONGO_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mongodb-users
              key: ANALYTICS_MONGO_PASSWORD
        command:
        - bash
        - -c
        - |
          set -e

          echo "Waiting for mongodb-0..."
          until mongosh --host mongodb-0.mongo-headless.{{ .Values.namespace }}.svc.cluster.local:27017 --eval "db.adminCommand('ping')" > /dev/null 2>&1; do
            sleep 3
          done

          echo "Waiting for mongodb-1..."
          until mongosh --host mongodb-1.mongo-headless.{{ .Values.namespace }}.svc.cluster.local:27017 --eval "db.adminCommand('ping')" > /dev/null 2>&1; do
            sleep 3
          done

          echo "Waiting for mongodb-2..."
          until mongosh --host mongodb-2.mongo-headless.{{ .Values.namespace }}.svc.cluster.local:27017 --eval "db.adminCommand('ping')" > /dev/null 2>&1; do
            sleep 3
          done

          echo "Initializing replica set..."
          mongosh --host mongodb-0.mongo-headless.{{ .Values.namespace }}.svc.cluster.local:27017 --eval '
            rs.initiate({
              _id: "rs0",
              members: [
                { _id: 0, host: "mongodb-0.mongo-headless.{{ .Values.namespace }}.svc.cluster.local:27017" },
                { _id: 1, host: "mongodb-1.mongo-headless.{{ .Values.namespace }}.svc.cluster.local:27017" },
                { _id: 2, host: "mongodb-2.mongo-headless.{{ .Values.namespace }}.svc.cluster.local:27017" }
              ]
            })
          '

          echo "Waiting for replica set to become available..."
          until mongosh "mongodb://mongodb-0.mongo-headless.{{ .Values.namespace }}.svc.cluster.local:27017,mongodb-1.mongo-headless.{{ .Values.namespace }}.svc.cluster.local:27017,mongodb-2.mongo-headless.{{ .Values.namespace }}.svc.cluster.local:27017/admin?replicaSet=rs0" --eval "db.hello()" | grep -q '"isWritablePrimary" : true'; do
            echo "Waiting for primary election..."
            sleep 2
          done

          echo "Creating app users..."
          mongosh "mongodb://$MONGO_ROOT_USERNAME:$MONGO_ROOT_PASSWORD@mongodb-0.mongo-headless.{{ .Values.namespace }}.svc.cluster.local:27017,mongodb-1.mongo-headless.{{ .Values.namespace }}.svc.cluster.local:27017,mongodb-2.mongo-headless.{{ .Values.namespace }}.svc.cluster.local:27017/admin?replicaSet=rs0&authSource=admin" --eval '
            var admin = db.getSiblingDB("admin");
            
            admin.createUser({ user: "$AUTH_MONGO_USERNAME", pwd: "$AUTH_MONGO_PASSWORD", roles: [{ role: "dbOwner", db: "auth_db" }, { role: "clusterMonitor" }] });
            admin.createUser({ user: "$CART_MONGO_USERNAME", pwd: "$CART_MONGO_PASSWORD", roles: [{ role: "dbOwner", db: "cart_db" }, { role: "clusterMonitor" }] });
            admin.createUser({ user: "$CATALOG_MONGO_USERNAME", pwd: "$CATALOG_MONGO_PASSWORD", roles: [{ role: "dbOwner", db: "catalog_db" }, { role: "clusterMonitor" }] });
            admin.createUser({ user: "$ORDER_MONGO_USERNAME", pwd: "$ORDER_MONGO_PASSWORD", roles: [{ role: "dbOwner", db: "order_db" }, { role: "clusterMonitor" }] });
            admin.createUser({ user: "$PAYMENT_MONGO_USERNAME", pwd: "$PAYMENT_MONGO_PASSWORD", roles: [{ role: "dbOwner", db: "payment_db" }, { role: "clusterMonitor" }] });
            admin.createUser({ user: "$NOTIFICATION_MONGO_USERNAME", pwd: "$NOTIFICATION_MONGO_PASSWORD", roles: [{ role: "dbOwner", db: "notification_db" }, { role: "clusterMonitor" }] });
            admin.createUser({ user: "$ANALYTICS_MONGO_USERNAME", pwd: "$ANALYTICS_MONGO_PASSWORD", roles: [{ role: "dbOwner", db: "analytics_db" }, { role: "clusterMonitor" }] });
            
            print("Created all database users");
          '

          echo "Replica set initialization complete!"

---
apiVersion: batch/v1
kind: Job
metadata:
  namespace: {{ .Values.namespace }}
  name: mongo-seed-products
  labels:
    app: mongodb
spec:
  backoffLimit: 10
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: mongo-seed-products
        image: mongo:7.0
        imagePullPolicy: {{ .Values.mongodb.imagePullPolicy }}
        env:
        - name: MONGO_ROOT_USERNAME
          valueFrom:
            secretKeyRef:
              name: mongodb-root
              key: MONGO_ROOT_USERNAME
        - name: MONGO_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mongodb-root
              key: MONGO_ROOT_PASSWORD
        command:
        - bash
        - -c
        - |
          set -e

          check_primary() {
            mongosh "mongodb://$MONGO_ROOT_USERNAME:$MONGO_ROOT_PASSWORD@mongodb-0.mongo-headless.{{ .Values.namespace }}.svc.cluster.local:27017,mongodb-1.mongo-headless.{{ .Values.namespace }}.svc.cluster.local:27017,mongodb-2.mongo-headless.{{ .Values.namespace }}.svc.cluster.local:27017/admin?replicaSet=rs0&authSource=admin" --quiet --eval "db.hello().isWritablePrimary" | grep -q true
          }

          echo "Waiting for writable MongoDB primary for catalog seed..."
          until check_primary; do
            echo "No writable primary yet. Retrying in 3s..."
            sleep 3
          done

          mongosh "mongodb://$MONGO_ROOT_USERNAME:$MONGO_ROOT_PASSWORD@mongodb-0.mongo-headless.{{ .Values.namespace }}.svc.cluster.local:27017,mongodb-1.mongo-headless.{{ .Values.namespace }}.svc.cluster.local:27017,mongodb-2.mongo-headless.{{ .Values.namespace }}.svc.cluster.local:27017/admin?replicaSet=rs0&authSource=admin" --eval '
            var catalogDb = db.getSiblingDB("catalog_db");
            var coll = catalogDb.getCollection("products");

            coll.createIndex({ id: 1 }, { unique: true, name: "uniq_product_id" });
            coll.createIndex({ categories: 1 }, { name: "idx_categories" });

            var products = [
              {id:"OLJCESPC7Z",name:"Sunglasses",description:"Add a modern touch to your outfits with these sleek aviator sunglasses.",picture:"/static/img/products/sunglasses.jpg",priceUsd:{currencyCode:"USD",units:NumberLong(19),nanos:NumberInt(990000000)},categories:["accessories"]},
              {id:"66VCHSJNUP",name:"Tank Top",description:"Perfectly cropped cotton tank, with a scooped neckline.",picture:"/static/img/products/tank-top.jpg",priceUsd:{currencyCode:"USD",units:NumberLong(18),nanos:NumberInt(990000000)},categories:["clothing","tops"]},
              {id:"1YMWWN1N4O",name:"Watch",description:"This gold-tone stainless steel watch will work with most of your outfits.",picture:"/static/img/products/watch.jpg",priceUsd:{currencyCode:"USD",units:NumberLong(109),nanos:NumberInt(990000000)},categories:["accessories"]},
              {id:"L9ECAV7KIM",name:"Loafers",description:"A neat addition to your summer wardrobe.",picture:"/static/img/products/loafers.jpg",priceUsd:{currencyCode:"USD",units:NumberLong(89),nanos:NumberInt(990000000)},categories:["footwear"]},
              {id:"2ZYFJ3GM2N",name:"Hairdryer",description:"This lightweight hairdryer has 3 heat and speed settings. It\x27s perfect for travel.",picture:"/static/img/products/hairdryer.jpg",priceUsd:{currencyCode:"USD",units:NumberLong(24),nanos:NumberInt(990000000)},categories:["hair","beauty"]},
              {id:"0PUK6V6EV0",name:"Candle Holder",description:"This small but intricate candle holder is an excellent gift.",picture:"/static/img/products/candle-holder.jpg",priceUsd:{currencyCode:"USD",units:NumberLong(18),nanos:NumberInt(990000000)},categories:["decor","home"]},
              {id:"LS4PSXUNUM",name:"Salt & Pepper Shakers",description:"Add some flavor to your kitchen.",picture:"/static/img/products/salt-and-pepper-shakers.jpg",priceUsd:{currencyCode:"USD",units:NumberLong(18),nanos:NumberInt(490000000)},categories:["kitchen"]},
              {id:"9SIQT8TOJO",name:"Bamboo Glass Jar",description:"This bamboo glass jar can hold 57 oz (1.7 l) and is perfect for any kitchen.",picture:"/static/img/products/bamboo-glass-jar.jpg",priceUsd:{currencyCode:"USD",units:NumberLong(5),nanos:NumberInt(490000000)},categories:["kitchen"]},
              {id:"6E92ZMYYFZ",name:"Mug",description:"A simple mug with a mustard interior.",picture:"/static/img/products/mug.jpg",priceUsd:{currencyCode:"USD",units:NumberLong(8),nanos:NumberInt(990000000)},categories:["kitchen"]}
            ];

            products.forEach(function(p) {
              coll.updateOne({ id: p.id }, { $set: p }, { upsert: true });
            });

            print("Seed complete. Product count: " + coll.countDocuments({}));
          '

---
apiVersion: batch/v1
kind: Job
metadata:
  namespace: {{ .Values.namespace }}
  name: mongo-migrate-shopdb-data
  labels:
    app: mongodb
spec:
  backoffLimit: 10
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: mongo-migrate-shopdb-data
        image: mongo:7.0
        imagePullPolicy: {{ .Values.mongodb.imagePullPolicy }}
        env:
        - name: MONGO_ROOT_USERNAME
          valueFrom:
            secretKeyRef:
              name: mongodb-root
              key: MONGO_ROOT_USERNAME
        - name: MONGO_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mongodb-root
              key: MONGO_ROOT_PASSWORD
        command:
        - bash
        - -c
        - |
          set -e

          check_primary() {
            mongosh "mongodb://$MONGO_ROOT_USERNAME:$MONGO_ROOT_PASSWORD@mongodb-0.mongo-headless.{{ .Values.namespace }}.svc.cluster.local:27017,mongodb-1.mongo-headless.{{ .Values.namespace }}.svc.cluster.local:27017,mongodb-2.mongo-headless.{{ .Values.namespace }}.svc.cluster.local:27017/admin?replicaSet=rs0&authSource=admin" --quiet --eval "db.hello().isWritablePrimary" | grep -q true
          }

          echo "Waiting for writable MongoDB primary for migration..."
          until check_primary; do
            echo "No writable primary yet. Retrying in 3s..."
            sleep 3
          done

          mongosh "mongodb://$MONGO_ROOT_USERNAME:$MONGO_ROOT_PASSWORD@mongodb-0.mongo-headless.{{ .Values.namespace }}.svc.cluster.local:27017,mongodb-1.mongo-headless.{{ .Values.namespace }}.svc.cluster.local:27017,mongodb-2.mongo-headless.{{ .Values.namespace }}.svc.cluster.local:27017/admin?replicaSet=rs0&authSource=admin" --eval '
            function migrateCollection(sourceDbName, sourceCollName, targetDbName, targetCollName, keyField) {
              var source = db.getSiblingDB(sourceDbName).getCollection(sourceCollName);
              var target = db.getSiblingDB(targetDbName).getCollection(targetCollName);
              var docs = source.find({}).toArray();
              docs.forEach(function(doc) {
                var query = {};
                query[keyField] = doc[keyField];
                target.updateOne(query, { $set: doc }, { upsert: true });
              });
              print("Migrated " + docs.length + " docs from " + sourceDbName + "." + sourceCollName + " to " + targetDbName + "." + targetCollName);
            }

            migrateCollection("shopdb", "users", "auth_db", "users", "email");
            migrateCollection("shopdb", "carts", "cart_db", "carts", "_id");
          '
