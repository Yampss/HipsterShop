---
apiVersion: v1
kind: Service
metadata:
  namespace: {{ .Values.namespace }}
  name: {{ .Values.mongodb.headlessServiceName }}
  labels:
    app: mongodb
spec:
  clusterIP: None
  selector:
    app: mongodb
  ports:
  - name: mongo
    port: 27017
    targetPort: 27017

---
apiVersion: v1
kind: Service
metadata:
  namespace: {{ .Values.namespace }}
  name: {{ .Values.mongodb.name }}
  labels:
    app: mongodb
spec:
  type: ClusterIP
  selector:
    app: mongodb
  ports:
  - name: mongo
    port: 27017
    targetPort: 27017

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  namespace: {{ .Values.namespace }}
  name: {{ .Values.mongodb.name }}
  labels:
    app: {{ .Values.mongodb.name }}
spec:
  serviceName: {{ .Values.mongodb.headlessServiceName }}
  replicas: {{ .Values.mongodb.replicas }}
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      terminationGracePeriodSeconds: 30
      containers:
      - name: mongodb
        image: {{ .Values.mongodb.image }}
        # Start with replica set name rs0, bind on all interfaces
        command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
        ports:
        - containerPort: 27017
          name: mongo
        env:
        - name: MONGO_INITDB_ROOT_USERNAME
          valueFrom:
            secretKeyRef:
              name: {{ .Values.mongodb.rootSecretName }}
              key: {{ .Values.mongodb.rootUsernameKey }}
        - name: MONGO_INITDB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.mongodb.rootSecretName }}
              key: {{ .Values.mongodb.rootPasswordKey }}
        - name: MONGO_INITDB_DATABASE
          value: {{ .Values.mongodb.initDatabase | quote }}
        volumeMounts:
        - name: mongo-data
          mountPath: /data/db
        readinessProbe:
          exec:
            command:
            - mongosh
            - --eval
            - "db.adminCommand('ping')"
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 5
        livenessProbe:
          exec:
            command:
            - mongosh
            - --eval
            - "db.adminCommand('ping')"
          initialDelaySeconds: 30
          periodSeconds: 20
          timeoutSeconds: 5
        resources:
          requests:
            cpu: {{ .Values.mongodb.resources.requests.cpu }}
            memory: {{ .Values.mongodb.resources.requests.memory }}
          limits:
            cpu: {{ .Values.mongodb.resources.limits.cpu }}
            memory: {{ .Values.mongodb.resources.limits.memory }}
  volumeClaimTemplates:
  - metadata:
      name: mongo-data
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: {{ .Values.mongodb.storageClass }}
      resources:
        requests:
          storage: {{ .Values.mongodb.storage }}

---
# One-time Job to bootstrap the MongoDB Replica Set AND create the admin user.
# Since we use `command` (bypassing Docker entrypoint), no users exist yet.
# We connect without auth, init the replica set, then create the root user.
apiVersion: batch/v1
kind: Job
metadata:
  namespace: {{ .Values.namespace }}
  name: {{ .Values.mongodb.initJobName }}
spec:
  backoffLimit: 10
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: mongo-init
        image: mongo:7.0
        env:
        - name: MONGO_ROOT_USERNAME
          valueFrom:
            secretKeyRef:
              name: {{ .Values.mongodb.rootSecretName }}
              key: {{ .Values.mongodb.rootUsernameKey }}
        - name: MONGO_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.mongodb.rootSecretName }}
              key: {{ .Values.mongodb.rootPasswordKey }}
        - name: AUTH_MONGO_USERNAME
          valueFrom:
            secretKeyRef:
              name: {{ .Values.mongodb.appSecretName }}
              key: {{ .Values.mongodb.authUsernameKey }}
        - name: AUTH_MONGO_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.mongodb.appSecretName }}
              key: {{ .Values.mongodb.authPasswordKey }}
        - name: CART_MONGO_USERNAME
          valueFrom:
            secretKeyRef:
              name: {{ .Values.mongodb.appSecretName }}
              key: {{ .Values.mongodb.cartUsernameKey }}
        - name: CART_MONGO_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.mongodb.appSecretName }}
              key: {{ .Values.mongodb.cartPasswordKey }}
        - name: CATALOG_MONGO_USERNAME
          valueFrom:
            secretKeyRef:
              name: {{ .Values.mongodb.appSecretName }}
              key: {{ .Values.mongodb.catalogUsernameKey }}
        - name: CATALOG_MONGO_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.mongodb.appSecretName }}
              key: {{ .Values.mongodb.catalogPasswordKey }}
        - name: ORDER_MONGO_USERNAME
          valueFrom:
            secretKeyRef:
              name: {{ .Values.mongodb.appSecretName }}
              key: {{ .Values.mongodb.orderUsernameKey }}
        - name: ORDER_MONGO_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.mongodb.appSecretName }}
              key: {{ .Values.mongodb.orderPasswordKey }}
        - name: PAYMENT_MONGO_USERNAME
          valueFrom:
            secretKeyRef:
              name: {{ .Values.mongodb.appSecretName }}
              key: {{ .Values.mongodb.paymentUsernameKey }}
        - name: PAYMENT_MONGO_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.mongodb.appSecretName }}
              key: {{ .Values.mongodb.paymentPasswordKey }}
        - name: NOTIFICATION_MONGO_USERNAME
          valueFrom:
            secretKeyRef:
              name: {{ .Values.mongodb.appSecretName }}
              key: {{ .Values.mongodb.notificationUsernameKey }}
        - name: NOTIFICATION_MONGO_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.mongodb.appSecretName }}
              key: {{ .Values.mongodb.notificationPasswordKey }}
        - name: ANALYTICS_MONGO_USERNAME
          valueFrom:
            secretKeyRef:
              name: {{ .Values.mongodb.appSecretName }}
              key: {{ .Values.mongodb.analyticsUsernameKey }}
        - name: ANALYTICS_MONGO_PASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.mongodb.appSecretName }}
              key: {{ .Values.mongodb.analyticsPasswordKey }}
        - name: MONGODB_HEADLESS_SERVICE
          value: "{{ .Values.mongodb.headlessServiceName }}.{{ .Values.namespace }}.svc.cluster.local"
        - name: MONGODB_REPLICA_SET
          value: "{{ .Values.mongodbReplicaSet }}"
        command:
        - bash
        - -c
        - |
          set -e

          echo "Waiting for mongodb-0..."
          until mongosh --host mongodb-0.$MONGODB_HEADLESS_SERVICE:27017 --eval "db.adminCommand('ping')" > /dev/null 2>&1; do
            sleep 3
          done
          echo "mongodb-0 ready."

          echo "Waiting for mongodb-1..."
          until mongosh --host mongodb-1.$MONGODB_HEADLESS_SERVICE:27017 --eval "db.adminCommand('ping')" > /dev/null 2>&1; do
            sleep 3
          done
          echo "mongodb-1 ready."

          echo "Waiting for mongodb-2..."
          until mongosh --host mongodb-2.$MONGODB_HEADLESS_SERVICE:27017 --eval "db.adminCommand('ping')" > /dev/null 2>&1; do
            sleep 3
          done
          echo "mongodb-2 ready."

          echo "All MongoDB pods ready. Initiating replica set..."
          mongosh --host mongodb-0.$MONGODB_HEADLESS_SERVICE:27017 --eval "
            try {
              var status = rs.status();
              if (status.ok === 1) {
                print('Replica set already initialized. Skipping rs.initiate().');
              }
            } catch (e) {
              print('Replica set not initialized yet. Proceeding with rs.initiate().');
              try {
                rs.initiate({
                  _id: '$MONGODB_REPLICA_SET',
                  members: [
                    { _id: 0, host: 'mongodb-0.$MONGODB_HEADLESS_SERVICE:27017', priority: 2 },
                    { _id: 1, host: 'mongodb-1.$MONGODB_HEADLESS_SERVICE:27017', priority: 1 },
                    { _id: 2, host: 'mongodb-2.$MONGODB_HEADLESS_SERVICE:27017', priority: 1 }
                  ]
                });
                print('Replica set initiated successfully.');
              } catch (initErr) {
                var msg = (initErr && initErr.message) ? initErr.message : '';
                if (msg.indexOf('already initialized') >= 0) {
                  print('Replica set already initialized by another actor. Continuing.');
                } else {
                  throw initErr;
                }
              }
            }
          "

          echo "Waiting for primary election..."
          until mongosh --host mongodb-0.mongo-headless.hipster.svc.cluster.local:27017 --eval "
            var status = rs.status();
            var hasPrimary = status.members && status.members.some(function(m) { return m.stateStr === 'PRIMARY'; });
            if (!hasPrimary) { quit(1); }
            print('Primary elected.');
          " > /dev/null 2>&1; do
            echo "  waiting for primary..."
            sleep 3
          done

          echo "Creating admin user..."
          mongosh --host mongodb-0.mongo-headless.hipster.svc.cluster.local:27017 --eval "
            var adminDb = db.getSiblingDB('admin');
            var existingUser = adminDb.getUser('$MONGO_ROOT_USERNAME');
            if (existingUser) {
              print('Admin user already exists. Skipping.');
            } else {
              adminDb.createUser({
                user: '$MONGO_ROOT_USERNAME',
                pwd: '$MONGO_ROOT_PASSWORD',
                roles: [{ role: 'root', db: 'admin' }]
              });
              print('Admin user created successfully.');
            }
          "

          echo "Creating application database users..."
          mongosh --host mongodb-0.mongo-headless.hipster.svc.cluster.local:27017 --authenticationDatabase admin -u "$MONGO_ROOT_USERNAME" -p "$MONGO_ROOT_PASSWORD" --eval "
            function ensureDbUser(dbName, userName, password) {
              var targetDb = db.getSiblingDB(dbName);
              var existingUser = targetDb.getUser(userName);
              if (existingUser) {
                print('User already exists for ' + dbName + ': ' + userName);
                return;
              }
              targetDb.createUser({
                user: userName,
                pwd: password,
                roles: [{ role: 'readWrite', db: dbName }]
              });
              print('Created user for ' + dbName + ': ' + userName);
            }

            ensureDbUser('auth_db', '$AUTH_MONGO_USERNAME', '$AUTH_MONGO_PASSWORD');
            ensureDbUser('cart_db', '$CART_MONGO_USERNAME', '$CART_MONGO_PASSWORD');
            ensureDbUser('catalog_db', '$CATALOG_MONGO_USERNAME', '$CATALOG_MONGO_PASSWORD');
            ensureDbUser('order_db', '$ORDER_MONGO_USERNAME', '$ORDER_MONGO_PASSWORD');
            ensureDbUser('payment_db', '$PAYMENT_MONGO_USERNAME', '$PAYMENT_MONGO_PASSWORD');
            ensureDbUser('notification_db', '$NOTIFICATION_MONGO_USERNAME', '$NOTIFICATION_MONGO_PASSWORD');
            ensureDbUser('analytics_db', '$ANALYTICS_MONGO_USERNAME', '$ANALYTICS_MONGO_PASSWORD');
          "

          echo "MongoDB replica set and admin user setup complete!"
