name: template

run-name: "${{ inputs.service_name }} triggered by commit - ${{ github.event.head_commit.message }} (${{ github.sha }}) "

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      service_path:
        required: true
        type: string
      runtime:
        required: true
        type: string
      node-version:
        required: false
        type: string
        default: "20"
      python-version:
        required: false
        type: string
        default: "3.11"
      go-version:
        required: false
        type: string
        default: "1.22"
      java-version:
        required: false
        type: string
        default: "21"
      dotnet-version:
        required: false
        type: string
        default: "8.0"
      java-build-tool:
        required: false
        type: string
        default: "maven"
    
    
    secrets:
      SNYK_TOKEN:
        required: true
      SONAR_TOKEN:
        required: true


jobs:
  pipeline:
    name: "ci of ${{ inputs.service_name }}"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.service_path }}
    steps:
      - uses: actions/checkout@v6
      
      - name: Fix file permissions (Gradle)
        if: inputs.runtime == 'java' && inputs.java-build-tool == 'gradle'
        run: chmod +x gradle/wrapper/gradle-wrapper.jar gradlew
      
      - name: nodejs setup
        if: inputs.runtime == 'node'
        uses: actions/setup-node@v4
        with: 
          node-version: ${{ inputs.node-version }}
          cache: npm
          cache-dependency-path: "${{ inputs.service_path }}/package-lock.json"
      - name: python setup 
        if: inputs.runtime == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: "pip"

      - name: java
        if: inputs.runtime == 'java'
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ inputs.java-version }}
          cache: ${{ inputs.java-build-tool }}
      - name: Setup .NET
        if: inputs.runtime == 'dotnet'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnet-version }}
          

      - name: node dependencies
        if: inputs.runtime == 'node'
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: python dependencies
        if: inputs.runtime == 'python'
        run: pip install -r requirements.txt

      - name: go modules
        if: inputs.runtime == 'go'
        run: go mod download

      - name: build go
        if: inputs.runtime == 'go'
        run: go build ./...

      - name: build java (Maven)
        if: inputs.runtime == 'java' && inputs.java-build-tool == 'maven'
        run: mvn -B package --no-transfer-progress

      - name: build java (Gradle)
        if: inputs.runtime == 'java' && inputs.java-build-tool == 'gradle'
        run: ./gradlew build -x test
        

      - name: Build .NET
        if: inputs.runtime == 'dotnet'
        run: dotnet build --configuration Release --no-restore

      # node and python don't have a separate compile step they go straight to tests below.

      - name: Test node
        if: inputs.runtime == 'node'
        run: npm test -- --passWithNoTests

      - name: Test python
        if: inputs.runtime == 'python'
        run: |
          pip install pytest
          pytest --tb=short || true

      - name: Test go
        if: inputs.runtime == 'go'
        run: go test ./... -v

      - name: Test Java (Maven)
        if: inputs.runtime == 'java' && inputs.java-build-tool == 'maven'
        run: mvn -B test --no-transfer-progress

      - name: Test Java (Gradle)
        if: inputs.runtime == 'java' && inputs.java-build-tool == 'gradle'
        run: ./gradlew test

      - name: Test .NET
        if: inputs.runtime == 'dotnet'
        run: dotnet test --no-build --configuration Release --verbosity normal


      - name: Check unused dependencies (Node)
        if: inputs.runtime == 'node'
        run: npx depcheck || true

      - name: Lint (Go — go vet)
        if: inputs.runtime == 'go'
        run: go vet ./...

      - name: Lint (.NET — format check)
        if: inputs.runtime == 'dotnet'
        run: dotnet format --verify-no-changes || true

      - name: Setup Snyk CLI
        uses: snyk/actions/setup@master

      - name: Install snyk-to-html
        run: npm install -g snyk-to-html   

      - name: Snyk scan (Node)
        if: inputs.runtime == 'node'
        run: snyk test --severity-threshold=high --json-file-output=snyk-report.json || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Convert Snyk report to HTML (Node)
        if: inputs.runtime == 'node'
        run: snyk-to-html -i snyk-report.json -o snyk-report.html

  
      - name: Snyk scan (Python)
        if: inputs.runtime == 'python'
        run: snyk test --file=requirements.txt --package-manager=pip --severity-threshold=high --json-file-output=snyk-report.json || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Convert Snyk report to HTML (Python)
        if: inputs.runtime == 'python'
        run: snyk-to-html -i snyk-report.json -o snyk-report.html

      - name: Snyk scan (Go)
        if: inputs.runtime == 'go'
        run: snyk test --file=go.mod --severity-threshold=high --json-file-output=snyk-report.json || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Convert Snyk report to HTML (Go)
        if: inputs.runtime == 'go'
        run: snyk-to-html -i snyk-report.json -o snyk-report.html

      - name: Snyk scan (Java - Maven)
        if: inputs.runtime == 'java' && inputs.java-build-tool == 'maven'
        run: snyk test --file=pom.xml --severity-threshold=high --json-file-output=snyk-report.json || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Snyk scan (Java - Gradle)
        if: inputs.runtime == 'java' && inputs.java-build-tool == 'gradle'
        run: snyk test --file=build.gradle --severity-threshold=high --json-file-output=snyk-report.json || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Convert Snyk report to HTML (Java)
        if: inputs.runtime == 'java'
        run: snyk-to-html -i snyk-report.json -o snyk-report.html

      - name: Snyk scan (.NET)
        if: inputs.runtime == 'dotnet'
        run: snyk test --file=$(ls *.csproj | head -1) --severity-threshold=high --json-file-output=snyk-report.json || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Convert Snyk report to HTML (.NET)
        if: inputs.runtime == 'dotnet'
        run: snyk-to-html -i snyk-report.json -o snyk-report.html

      - name: Upload Snyk HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: snyk-report-${{ inputs.service_name }}
          path: ${{ inputs.service_path }}/snyk-report.html
          retention-days: 14

      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          projectBaseDir: ${{ inputs.service_path }}
          args: >
            -Dsonar.projectKey=${{ inputs.service_name }}
            -Dsonar.projectName=${{ inputs.service_name }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: "http://34.201.100.11:9000/"  
    
      - name: Send Email on Failure
        if: failure()
        uses: dawidd6/action-send-mail@v6
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "CI Failed - ${{ inputs.service_name }}"
          to: 307401@ust.com
          from: GitHub CI
          body: |
            Service: ${{ inputs.service_name }}
            Commit: ${{ github.event.head_commit.message }}
            Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}



