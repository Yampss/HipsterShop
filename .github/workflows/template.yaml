name: template

run-name: "${{ inputs.service_name }} triggered by commit - ${{ github.event.head_commit.message }} (${{ github.sha }})"

on:
  workflow_call:
    inputs:
      service_name:
        required: true
        type: string
      service_path:
        required: true
        type: string
      runtime:
        required: true
        type: string
      node-version:
        required: false
        type: string
        default: "20"
      python-version:
        required: false
        type: string
        default: "3.11"
      go-version:
        required: false
        type: string
        default: "1.22"
      java-version:
        required: false
        type: string
        default: "21"
      dotnet-version:
        required: false
        type: string
        default: "8.0"
      java-build-tool:
        required: false
        type: string
        default: "maven"

    secrets:
      SNYK_TOKEN:
        required: true
      SONAR_TOKEN:
        required: true
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false
      SONAR_HOST_URL:
        required: false
      SENDGRID_API_KEY:
        required: false


jobs:
  scan:
    name: "scan ${{ inputs.service_name }}"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.service_path }}

    steps:
      - uses: actions/checkout@v4

      - name: Fix file permissions (Gradle)
        if: inputs.runtime == 'java' && inputs.java-build-tool == 'gradle'
        run: chmod +x gradle/wrapper/gradle-wrapper.jar gradlew


      - name: Setup Node.js
        if: inputs.runtime == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm
          cache-dependency-path: "${{ inputs.service_path }}/package-lock.json"

      - name: Setup Python
        if: inputs.runtime == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip

      - name: Setup Java
        if: inputs.runtime == 'java'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ inputs.java-version }}
          cache: ${{ inputs.java-build-tool }}

      - name: Setup .NET
        if: inputs.runtime == 'dotnet'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnet-version }}

      - name: Install Node dependencies
        if: inputs.runtime == 'node'
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Install Python dependencies
        if: inputs.runtime == 'python'
        run: pip install -r requirements.txt

      - name: Download Go modules
        if: inputs.runtime == 'go'
        run: go mod download

      - name: Build (Go)
        if: inputs.runtime == 'go'
        run: go build ./...

      - name: Build (Java — Maven)
        if: inputs.runtime == 'java' && inputs.java-build-tool == 'maven'
        run: mvn -B package --no-transfer-progress

      - name: Build (Java — Gradle)
        if: inputs.runtime == 'java' && inputs.java-build-tool == 'gradle'
        run: ./gradlew build -x test

      - name: Build (.NET)
        if: inputs.runtime == 'dotnet'
        run: dotnet build $(ls *.csproj | head -1) --configuration Release --no-restore

      - name: Test (Node)
        if: inputs.runtime == 'node'
        run: npm test -- --passWithNoTests

      - name: Test (Python)
        if: inputs.runtime == 'python'
        run: |
          pip install pytest
          pytest --tb=short || true

      - name: Test (Go)
        if: inputs.runtime == 'go'
        run: go test ./... -v

      - name: Test (Java — Maven)
        if: inputs.runtime == 'java' && inputs.java-build-tool == 'maven'
        run: mvn -B test --no-transfer-progress

      - name: Test (Java — Gradle)
        if: inputs.runtime == 'java' && inputs.java-build-tool == 'gradle'
        run: ./gradlew test

      - name: Test (.NET)
        if: inputs.runtime == 'dotnet'
        run: dotnet test $(ls *.csproj | head -1) --no-build --configuration Release --verbosity normal
        
      - name: Lint (Node — depcheck)
        if: inputs.runtime == 'node'
        run: npx depcheck || true

      - name: Lint (Go — go vet)
        if: inputs.runtime == 'go'
        run: go vet ./...

      - name: Lint (.NET — format check)
        if: inputs.runtime == 'dotnet'
        run: dotnet format --verify-no-changes || true

      - name: Setup Snyk CLI
        uses: snyk/actions/setup@master

      - name: Install snyk-to-html
        run: npm install -g snyk-to-html

      - name: Snyk scan (Node)
        if: inputs.runtime == 'node'
        run: snyk test --severity-threshold=high --json-file-output=snyk-report.json || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Snyk scan (Python)
        if: inputs.runtime == 'python'
        run: snyk test --file=requirements.txt --package-manager=pip --severity-threshold=high --json-file-output=snyk-report.json || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Snyk scan (Go)
        if: inputs.runtime == 'go'
        run: snyk test --file=go.mod --severity-threshold=high --json-file-output=snyk-report.json || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Snyk scan (Java — Maven)
        if: inputs.runtime == 'java' && inputs.java-build-tool == 'maven'
        run: snyk test --file=pom.xml --severity-threshold=high --json-file-output=snyk-report.json || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Snyk scan (Java — Gradle)
        if: inputs.runtime == 'java' && inputs.java-build-tool == 'gradle'
        run: snyk test --file=build.gradle --severity-threshold=high --json-file-output=snyk-report.json || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Snyk scan (.NET)
        if: inputs.runtime == 'dotnet'
        run: snyk test --file=$(ls *.csproj | head -1) --severity-threshold=high --json-file-output=snyk-report.json || true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Convert Snyk report to HTML
        run: snyk-to-html -i snyk-report.json -o snyk-report.html

      - name: Upload Snyk HTML report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: snyk-report-${{ inputs.service_name }}
          path: ${{ inputs.service_path }}/snyk-report.html
          retention-days: 14

      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v6
        with:
          projectBaseDir: ${{ inputs.service_path }}
          args: >
            -Dsonar.projectKey=${{ inputs.service_name }}
            -Dsonar.projectName=${{ inputs.service_name }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}


  build-and-push:
    name: "build and push ${{ inputs.service_name }}"
    runs-on: ubuntu-latest
    needs: scan                  
    if: success()                 

    steps:
      - uses: actions/checkout@v4

      - name: Check Docker Hub credentials
        id: docker_check
        run: |
          if [ -n "${{ secrets.DOCKERHUB_USERNAME }}" ] && [ -n "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "has_credentials=true" >> $GITHUB_OUTPUT
          else
            echo "has_credentials=false" >> $GITHUB_OUTPUT
          fi

      - name: Check SendGrid credentials
        id: email_check
        run: |
          if [ -n "${{ secrets.SENDGRID_API_KEY }}" ]; then
            echo "has_credentials=true" >> $GITHUB_OUTPUT
          else
            echo "has_credentials=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        if: steps.docker_check.outputs.has_credentials == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: steps.docker_check.outputs.has_credentials == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract image metadata
        if: steps.docker_check.outputs.has_credentials == 'true'
        id: meta
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "image_tag=${{ secrets.DOCKERHUB_USERNAME }}/hipstershop-${{ inputs.service_name }}:${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "image_latest=${{ secrets.DOCKERHUB_USERNAME }}/hipstershop-${{ inputs.service_name }}:latest" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        if: steps.docker_check.outputs.has_credentials == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ${{ inputs.service_path }}   
          push: true
          tags: |
            ${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.image_latest }}
          cache-from: type=registry,ref=${{ steps.meta.outputs.image_latest }}
          cache-to: type=inline

      - name: Send email notification
        if: always() && steps.email_check.outputs.has_credentials == 'true'
        uses: licenseware/send-email-notification@v1
        with:
          api-key: ${{ secrets.SENDGRID_API_KEY }}
          subject: "CI ${{ job.status }} - ${{ inputs.service_name }} (${{ github.sha }})"
          from-email: chrissattasseril16@gmail.com
          to-email: 307401@ust.com
          markdown-body: |
            ## CI Pipeline ${{ job.status }}

            **Service:** ${{ inputs.service_name }}
            **Commit:** ${{ github.event.head_commit.message }}
            **SHA:** ${{ github.sha }}
            **Actor:** ${{ github.actor }}
            **Status:** ${{ job.status }}
            ${{ steps.docker_check.outputs.has_credentials == 'true' && format('**Docker Image:** {0}/hipstershop-{1}:{2}', secrets.DOCKERHUB_USERNAME, inputs.service_name, steps.meta.outputs.short_sha) || '' }}

            [View Logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})