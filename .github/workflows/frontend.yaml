name: frontend CI

on:
  push:
    branches:
      - ci-v1
    paths:
      - 'src/frontend/**'
      - '.github/workflows/frontend.yaml'
      - '.github/workflows/template.yaml'
  pull_request:
    branches:
      - ci-v1
    paths:
      - 'src/frontend/**'
      - '.github/workflows/frontend.yaml'
      - '.github/workflows/template.yaml'

jobs:
  call-template:
    uses: ./.github/workflows/template.yaml
    with:
      service_name: frontend
      service_path: src/frontend
      runtime: go
      go-version: "1.22"
    secrets:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
