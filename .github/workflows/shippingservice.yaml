name: shippingservice CI

on:
  push:
    branches:
      - ci-v1
    paths:
      - 'src/shippingservice/**'
      - '.github/workflows/shippingservice.yaml'
      - '.github/workflows/template.yaml'
  pull_request:
    branches:
      - ci-v1
    paths:
      - 'src/shippingservice/**'
      - '.github/workflows/shippingservice.yaml'
      - '.github/workflows/template.yaml'

jobs:
  call-template:
    uses: ./.github/workflows/template.yaml
    with:
      service_name: shippingservice
      service_path: src/shippingservice
      runtime: go
      go-version: "1.22"
    secrets:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
