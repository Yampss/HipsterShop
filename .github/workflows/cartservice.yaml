name: cartservice CI

on:
  push:
    branches:
      - ci-v1
    paths:
      - 'src/cartservice/**'
      - '.github/workflows/cartservice.yaml'
      - '.github/workflows/template.yaml'
  pull_request:
    branches:
      - ci-v1
    paths:
      - 'src/cartservice/**'
      - '.github/workflows/cartservice.yaml'
      - '.github/workflows/template.yaml'

jobs:
  call-template:
    uses: ./.github/workflows/template.yaml
    with:
      service_name: cartservice
      service_path: src/cartservice
      runtime: dotnet
      dotnet-version: "10.0"
    secrets:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
