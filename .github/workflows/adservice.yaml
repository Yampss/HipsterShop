name: adservice CI

on:
  push:
    branches:
      - ci-v1
    paths:
      - 'src/adservice/**'
      - '.github/workflows/adservice.yaml'
      - '.github/workflows/template.yaml'
  pull_request:
    branches:
      - ci-v1
    paths:
      - 'src/adservice/**'
      - '.github/workflows/adservice.yaml'
      - '.github/workflows/template.yaml'

jobs:
  call-template:
    uses: ./.github/workflows/template.yaml
    with:
      service_name: adservice
      service_path: src/adservice
      runtime: java
      java-version: "21"
    secrets:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
