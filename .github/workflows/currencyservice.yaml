name: currencyservice CI

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'src/currencyservice/**'
      - '.github/workflows/currencyservice.yaml'
      - '.github/workflows/template.yaml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'src/currencyservice/**'
      - '.github/workflows/currencyservice.yaml'
      - '.github/workflows/template.yaml'

permissions:
  contents: write

jobs:
  call-template:
    uses: ./.github/workflows/template.yaml
    with:
      github_event_name: ${{ github.event_name }}
      service_name: currencyservice
      service_path: src/currencyservice
      runtime: node
      node-version: "20"
    secrets:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
