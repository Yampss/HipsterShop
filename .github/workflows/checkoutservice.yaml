name: checkoutservice CI

on:
  push:
    branches:
      - chore/ci-setup
    paths:
      - 'src/checkoutservice/**'
      - '.github/workflows/checkoutservice.yaml'
      - '.github/workflows/template.yaml'
  pull_request:
    branches:
      - chore/ci-setup
    paths:
      - 'src/checkoutservice/**'
      - '.github/workflows/checkoutservice.yaml'
      - '.github/workflows/template.yaml'

jobs:
  call-template:
    uses: ./.github/workflows/template.yaml
    with:
      service_name: checkoutservice
      service_path: src/checkoutservice
      runtime: go
      go-version: "1.26.1"
    secrets:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
