name: checkoutservice CI

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'src/checkoutservice/**'
      - '.github/workflows/checkoutservice.yaml'
      - '.github/workflows/template.yaml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'src/checkoutservice/**'
      - '.github/workflows/checkoutservice.yaml'
      - '.github/workflows/template.yaml'

permissions:
  contents: write

jobs:
  call-template:
    uses: ./.github/workflows/template.yaml
    with:
      service_name: checkoutservice
      service_path: src/checkoutservice
      runtime: go
      go-version: "1.26.1"
    secrets:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
