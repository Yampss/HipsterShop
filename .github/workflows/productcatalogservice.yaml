name: productcatalogservice CI

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'src/productcatalogservice/**'
      - '.github/workflows/productcatalogservice.yaml'
      - '.github/workflows/template.yaml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'src/productcatalogservice/**'
      - '.github/workflows/productcatalogservice.yaml'
      - '.github/workflows/template.yaml'

jobs:
  call-template:
    uses: ./.github/workflows/template.yaml
    with:
      service_name: productcatalogservice
      service_path: src/productcatalogservice
      runtime: go
      go-version: "1.26.1"
    secrets:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
