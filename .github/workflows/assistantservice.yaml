name: assistantservice CI

on:
  push:
    branches:
      - feature/ci
    paths:
      - 'src/assistantservice/**'
      - '.github/workflows/assistantservice.yaml'
      - '.github/workflows/template.yaml'
  pull_request:
    branches:
      - feature/ci
    paths:
      - 'src/assistantservice/**'
      - '.github/workflows/assistantservice.yaml'
      - '.github/workflows/template.yaml'

jobs:
  call-template:
    uses: ./.github/workflows/template.yaml
    with:
      service_name: assistantservice
      service_path: src/assistantservice
      runtime: python
      python-version: "3.10"
    secrets:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
