apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.routes.shipping.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.shippingservice.name }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}

  rules:
    - matches:
        - path:
            type: PathPrefix
            value: {{ .Values.routes.shipping.path }}

      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: {{ .Values.routes.shipping.rewrite }}

      backendRefs:
        - name: {{ .Values.shippingservice.name }}
          port: {{ .Values.shippingservice.port }}


