apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.routes.recommendation.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.recommendationservice.name }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}

  rules:
    - matches:
        - path:
            type: Exact
            value: {{ .Values.routes.recommendation.path }}

      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplaceFullPath
              replaceFullPath: {{ .Values.routes.recommendation.rewrite }}

      backendRefs:
        - name: {{ .Values.recommendationservice.name }}
          port: {{ .Values.recommendationservice.port }}


