apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.shippingservice.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.shippingservice.name }}
spec:
  replicas: {{ .Values.shippingservice.replicas }}
  selector:
    matchLabels:
      app: {{ .Values.shippingservice.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.shippingservice.name }}
    spec:
      containers:
        - name: server
          image: {{ .Values.shippingservice.image }}
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: {{ .Values.shippingservice.port }}

          envFrom:
            - configMapRef:
                name: {{ .Values.configmap.name }}

          env:
            - name: PORT
              value: "{{ .Values.shippingservice.port }}"

          readinessProbe:
            periodSeconds: 5
            httpGet:
              path: "/_healthz"
              port: {{ .Values.shippingservice.port }}

          livenessProbe:
            httpGet:
              path: "/_healthz"
              port: {{ .Values.shippingservice.port }}

          resources:
            {{- toYaml .Values.shippingservice.resources | nindent 12 }}

---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.shippingservice.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.shippingservice.name }}
spec:
  type: ClusterIP
  selector:
    app: {{ .Values.shippingservice.name }}
  ports:
    - name: grpc
      port: {{ .Values.shippingservice.port }}
      targetPort: {{ .Values.shippingservice.port }}
