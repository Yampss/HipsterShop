apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.routes.assistant.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.assistantservice.name }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}

  rules:
    - matches:
        - path:
            type: Exact
            value: {{ .Values.routes.assistant.path }}

      backendRefs:
        - name: {{ .Values.assistantservice.name }}
          port: {{ .Values.assistantservice.port }}
