apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Values.routes.productcatalog.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app: {{ .Values.productcatalogservice.name }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.name }}

  rules:
    {{- range .Values.routes.productcatalog.rules }}
    - matches:
        - path:
            type: {{ .type }}
            value: {{ .path }}

      {{- if .rewriteType }}
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: {{ .rewriteType }}
              {{- if eq .rewriteType "ReplacePrefixMatch" }}
              replacePrefixMatch: {{ .rewrite }}
              {{- else }}
              replaceFullPath: {{ .rewrite }}
              {{- end }}
      {{- end }}

      backendRefs:
        - name: {{ $.Values.productcatalogservice.name }}
          port: {{ $.Values.productcatalogservice.port }}
    {{- end }}


