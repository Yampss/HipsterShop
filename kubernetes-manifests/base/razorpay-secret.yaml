# ═══════════════════════════════════════════════════════════════════
#  Razorpay API Keys — paymentservice (hipster-backend namespace)
#
#  ⚠  IMPORTANT: Replace the placeholder values below with your real
#     Razorpay TEST keys before applying this manifest.
#
#     Get your keys at:
#     https://dashboard.razorpay.com/app/keys
#     (Switch to TEST mode in the dashboard first)
#
#  How to apply:
#     kubectl apply -f kubernetes-manifests/base/razorpay-secret.yaml
#
#  Never commit real Razorpay keys to source control.
#  Use a secrets manager (e.g. Sealed Secrets, Vault, External Secrets)
#  for production deployments.
# ═══════════════════════════════════════════════════════════════════
apiVersion: v1
kind: Secret
metadata:
  namespace: hipster-backend
  name: razorpay-keys
  labels:
    app: paymentservice
    component: payment-secrets
type: Opaque
stringData:
  RAZORPAY_KEY_ID: "rzp_test_REPLACE_WITH_YOUR_RAZORPAY_KEY_ID"
  RAZORPAY_KEY_SECRET: "REPLACE_WITH_YOUR_RAZORPAY_KEY_SECRET"
