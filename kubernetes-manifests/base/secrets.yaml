# ═══════════════════════════════════════════════════════════════════
#  hipster-frontend Secrets
# ═══════════════════════════════════════════════════════════════════
apiVersion: v1
kind: Secret
metadata:
  namespace: hipster-frontend
  name: app-secrets
type: Opaque
stringData:
  JWT_SECRET: "team4hipstershopsecret"

# ═══════════════════════════════════════════════════════════════════
#  hipster-backend Secrets
# ═══════════════════════════════════════════════════════════════════
---
apiVersion: v1
kind: Secret
metadata:
  namespace: hipster-backend
  name: app-secrets
type: Opaque
stringData:
  JWT_SECRET: "team4hipstershopsecret"
  GEMINI_API_KEY: "REPLACE_WITH_GEMINI_API_KEY"

---
apiVersion: v1
kind: Secret
metadata:
  namespace: hipster-backend
  name: mongodb-root
type: Opaque
stringData:
  MONGO_ROOT_USERNAME: admin
  MONGO_ROOT_PASSWORD: mongopassword

---
apiVersion: v1
kind: Secret
metadata:
  namespace: hipster-backend
  name: mongodb-users
type: Opaque
stringData:
  AUTH_MONGO_USERNAME: auth_user
  AUTH_MONGO_PASSWORD: auth_password
  CART_MONGO_USERNAME: cart_user
  CART_MONGO_PASSWORD: cart_password
  CATALOG_MONGO_USERNAME: catalog_user
  CATALOG_MONGO_PASSWORD: catalog_password
  ORDER_MONGO_USERNAME: order_user
  ORDER_MONGO_PASSWORD: order_password
  PAYMENT_MONGO_USERNAME: payment_user
  PAYMENT_MONGO_PASSWORD: payment_password
  NOTIFICATION_MONGO_USERNAME: notification_user
  NOTIFICATION_MONGO_PASSWORD: notification_password
  ANALYTICS_MONGO_USERNAME: analytics_user
  ANALYTICS_MONGO_PASSWORD: analytics_password
