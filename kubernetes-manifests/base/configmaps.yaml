apiVersion: v1
kind: ConfigMap
metadata:
  name: hipster-config
  namespace: hipster
data:
  ENABLE_TRACING: "1"
  COLLECTOR_SERVICE_ADDR: "jaeger:4317"
  FRONTEND_MESSAGE: "Checkout HipsterShop today!"
  ENABLE_ASSISTANT: "true"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: service-addresses
  namespace: hipster
data:
  GATEWAY_ADDR: "hipstershop-gateway.hipster.svc.cluster.local:80"
  PRODUCT_CATALOG_SERVICE_ADDR: "productcatalogservice:3550"
  SHIPPING_SERVICE_ADDR: "shippingservice:50051"
  PAYMENT_SERVICE_ADDR: "paymentservice:50051"
  EMAIL_SERVICE_ADDR: "emailservice:8080"
  CURRENCY_SERVICE_ADDR: "currencyservice:7000"
  CART_SERVICE_ADDR: "cartservice:7070"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: service-ports
  namespace: hipster
data:
  ADSERVICE_PORT: "9555"
  AUTHSERVICE_PORT: "8081"
  CARTSERVICE_PORT: "7070"
  CHECKOUTSERVICE_PORT: "5050"
  CURRENCYSERVICE_PORT: "7000"
  EMAILSERVICE_PORT: "8080"
  FRONTEND_PORT: "8080"
  PAYMENTSERVICE_PORT: "50051"
  PRODUCTCATALOG_PORT: "3550"
  RECOMMENDATIONSERVICE_PORT: "8080"
  SHIPPINGSERVICE_PORT: "50051"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mongodb-config
  namespace: hipster
data:
  MONGO_REPLICA_SET: "rs0"
  AUTH_DB_NAME: "auth_db"
  CART_DB_NAME: "cart_db"
  CATALOG_DB_NAME: "catalog_db"
  ORDER_DB_NAME: "order_db"
  PAYMENT_DB_NAME: "payment_db"
  NOTIFICATION_DB_NAME: "notification_db"
  ANALYTICS_DB_NAME: "analytics_db"
  CATALOG_PRODUCTS_COLLECTION: "products"
  ORDER_ORDERS_COLLECTION: "orders"
  ORDER_EVENTS_COLLECTION: "order_events"
  PAYMENT_CHARGES_COLLECTION: "charges"
  ANALYTICS_RECOMMENDATIONS_COLLECTION: "recommendations"
  NOTIFICATION_EMAIL_EVENTS_COLLECTION: "email_events"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-features
  namespace: hipster
data:
  CURRENCY_SERVICE_RANDOM_ERROR: "1"
  PAYMENT_SERVICE_DISABLE_PROFILER: "1"
  PRODUCT_CATALOG_SEED_DATABASE: "true"
  GEMINI_MODEL: "gemini-2.5-flash"
