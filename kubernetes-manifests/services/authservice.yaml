apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: hipster
  name: authservice
  labels:
    app: authservice
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: authservice
  template:
    metadata:
      labels:
        app: authservice
        tier: backend
    spec:
      terminationGracePeriodSeconds: 5
      initContainers:
      - name: wait-for-mongodb-primary
        image: mongo:7.0
        envFrom:
        - configMapRef:
            name: hipster-config
        env:
        - name: MONGO_USERNAME
          valueFrom:
            secretKeyRef:
              name: mongodb-root
              key: MONGO_ROOT_USERNAME
        - name: MONGO_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mongodb-root
              key: MONGO_ROOT_PASSWORD
        command:
        - bash
        - -c
        - |
          set -e

          check_primary() {
            mongosh "mongodb://$MONGO_USERNAME:$MONGO_PASSWORD@mongodb-0.mongo-headless.hipster.svc.cluster.local:27017,mongodb-1.mongo-headless.hipster.svc.cluster.local:27017,mongodb-2.mongo-headless.hipster.svc.cluster.local:27017/admin?replicaSet=rs0&authSource=admin" \
              --quiet --eval "db.hello().isWritablePrimary" | grep -q true || \
            mongosh "mongodb://mongodb-0.mongo-headless.hipster.svc.cluster.local:27017,mongodb-1.mongo-headless.hipster.svc.cluster.local:27017,mongodb-2.mongo-headless.hipster.svc.cluster.local:27017/admin?replicaSet=rs0" \
              --quiet --eval "db.hello().isWritablePrimary" | grep -q true
          }

          echo "Waiting for MongoDB replica set primary..."
          until check_primary; do
            echo "No writable primary yet. Retrying in 3s..."
            sleep 3
          done
          echo "MongoDB primary is ready."
      containers:
      - name: server
        image: cazzzzz/trf-authservice-hipster:latest
        ports:
        - containerPort: 8081
        envFrom:
        - configMapRef:
            name: hipster-config
        env:
        - name: MONGO_USERNAME
          valueFrom:
            secretKeyRef:
              name: mongodb-users
              key: AUTH_MONGO_USERNAME
        - name: MONGO_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mongodb-users
              key: AUTH_MONGO_PASSWORD
        - name: MONGO_DATABASE
          valueFrom:
            configMapKeyRef:
              name: mongodb-config
              key: AUTH_DB_NAME
        - name: MONGO_URI
          value: "mongodb://$(MONGO_USERNAME):$(MONGO_PASSWORD)@mongodb-0.mongo-headless.hipster.svc.cluster.local:27017,mongodb-1.mongo-headless.hipster.svc.cluster.local:27017,mongodb-2.mongo-headless.hipster.svc.cluster.local:27017/auth_db?replicaSet=rs0&authSource=auth_db&authMechanism=SCRAM-SHA-256"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: JWT_SECRET
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: service-ports
              key: AUTHSERVICE_PORT
        readinessProbe:
          initialDelaySeconds: 10
          httpGet:
            path: "/_healthz"
            port: 8081
        livenessProbe:
          initialDelaySeconds: 15
          periodSeconds: 10
          httpGet:
            path: "/_healthz"
            port: 8081
        resources:
          requests:
            cpu: 100m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  namespace: hipster
  name: authservice
  labels:
    app: authservice
spec:
  type: ClusterIP
  selector:
    app: authservice
  ports:
  - name: http
    port: 8081
    targetPort: 8081
