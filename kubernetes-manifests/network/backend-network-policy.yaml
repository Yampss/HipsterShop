# ── Default deny all traffic in hipster-backend ──────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: hipster-backend
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress

---
# ── Allow required backend traffic ───────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backend-allow
  namespace: hipster-backend
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow from HAProxy EC2 instance -> kgateway (external reverse proxy)
  # Using /32 (single host) for least-privilege. If your HAProxy instance IP
  # changes or you have multiple HAProxy nodes, switch to 172.31.0.0/16 (full VPC).
  - from:
    - ipBlock:
        # cidr: 172.31.77.99/32   # HAProxy private IP — change if needed
        cidr: 172.31.0.0/16   # uncomment this (and remove line above) to allow full VPC
  # Allow from hipster-frontend (frontend -> gateway)
  - from:
    - namespaceSelector:
        matchLabels:
          name: hipster-frontend
  # Allow within hipster-backend (inter-service + gateway routing)
  - from:
    - podSelector: {}
  egress:
  # Allow to hipster-database (backend services -> MongoDB)
  - to:
    - namespaceSelector:
        matchLabels:
          name: hipster-database
  # Allow within hipster-backend (inter-service communication)
  - to:
    - podSelector: {}
  # Allow to hipster-frontend (gateway -> frontend service)
  - to:
    - namespaceSelector:
        matchLabels:
          name: hipster-frontend
  # Allow to kgateway control-plane (envoy xDS config)
  # Default kgateway install namespace is 'gloo-system'.
  # If yours differs, update the label below to match your actual namespace.
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kgateway-system
  # Allow to kube-apiserver (kgateway controller watches K8s resources)
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - protocol: TCP
      port: 443
  # DNS resolution
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
