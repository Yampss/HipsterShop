apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  namespace: hipster-backend
  name: productcatalog-route
  
  labels:
    app: productcatalogservice
spec:
  parentRefs:
    - name: hipstershop-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/products/
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplacePrefixMatch
              replacePrefixMatch: /products/
      backendRefs:
        - name: productcatalogservice
          port: 3550
    - matches:
        - path:
            type: Exact
            value: /api/products
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplaceFullPath
              replaceFullPath: /products
      backendRefs:
        - name: productcatalogservice
          port: 3550
