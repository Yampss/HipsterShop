apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  namespace: hipster-backend
  name: frontend-route
  labels:
    app: frontend
spec:
  parentRefs:
    - name: hipstershop-gateway
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /static/
      backendRefs:
        - name: frontend
          namespace: hipster-frontend
          port: 80
    - matches:
        - path:
            type: Exact
            value: /_healthz
      backendRefs:
        - name: frontend
          namespace: hipster-frontend
          port: 80
    - matches:
        - path:
            type: PathPrefix
            value: /product
      backendRefs:
        - name: frontend
          namespace: hipster-frontend
          port: 80
    - matches:
        - path:
            type: PathPrefix
            value: /cart
      backendRefs:
        - name: frontend
          namespace: hipster-frontend
          port: 80
    - matches:
        - path:
            type: Exact
            value: /setCurrency
      backendRefs:
        - name: frontend
          namespace: hipster-frontend
          port: 80
    - matches:
        - path:
            type: Exact
            value: /login
      backendRefs:
        - name: frontend
          namespace: hipster-frontend
          port: 80
    - matches:
        - path:
            type: Exact
            value: /signup
      backendRefs:
        - name: frontend
          namespace: hipster-frontend
          port: 80
    - matches:
        - path:
            type: Exact
            value: /logout
      backendRefs:
        - name: frontend
          namespace: hipster-frontend
          port: 80
    - matches:
        - path:
            type: Exact
            value: /
      backendRefs:
        - name: frontend
          namespace: hipster-frontend
          port: 80
