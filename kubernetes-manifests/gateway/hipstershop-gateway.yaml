apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  namespace: hipster-backend
  name: hipstershop-gateway
  labels:
    app: hipstershop
spec:
  gatewayClassName: kgateway
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
