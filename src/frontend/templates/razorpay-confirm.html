<!--
 Razorpay Order Confirmation Page
 Shown after successful Razorpay payment + order placement.
 The orderId and transactionId are passed as query params by the cart JS.
-->
{{ define "razorpay-confirm" }}
    {{ template "header" . }}

    <main role="main" class="order">

        <section class="container order-complete-section">
            <div class="row">
                <div class="col-12 text-center">
                    <h3>Your order is complete!</h3>
                </div>
                <div class="col-12 text-center">
                    <p>Payment processed securely via Razorpay. We've sent you a confirmation email.</p>
                </div>
            </div>
            <div class="row border-bottom-solid padding-y-24">
                <div class="col-6 pl-md-0">Confirmation #</div>
                <div class="col-6 pr-md-0 text-right">{{ .order_id }}</div>
            </div>
            <div class="row border-bottom-solid padding-y-24">
                <div class="col-6 pl-md-0">Payment ID</div>
                <div class="col-6 pr-md-0 text-right">{{ .txn_id }}</div>
            </div>
            <div class="row">
                <div class="col-12 text-center" style="margin-top:1.5rem;">
                    <a class="cymbal-button-primary" href="{{ $.baseUrl }}/" role="button">
                        Continue Shopping
                    </a>
                </div>
            </div>
        </section>

    </main>

    {{ template "footer" . }}
{{ end }}
