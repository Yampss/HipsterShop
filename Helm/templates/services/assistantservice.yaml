apiVersion: apps/v1
kind: Deployment
metadata:
  name: assistantservice
  namespace: {{ .Release.Namespace }}
  labels:
    app: assistantservice
    {{- include "hipstershop.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas.assistantservice }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: {{ .Values.rollingUpdate.maxUnavailable }}
      maxSurge: {{ .Values.rollingUpdate.maxSurge }}
  selector:
    matchLabels:
      app: assistantservice
  template:
    metadata:
      labels:
        app: assistantservice
    spec:
      containers:
      - name: server
        image: {{ .Values.images.assistantservice }}
        ports:
        - containerPort: {{ .Values.ports.assistantservice }}
        envFrom:
        - configMapRef:
            name: hipster-config
        env:
        - name: GATEWAY_ADDR
          valueFrom:
            configMapKeyRef:
              name: service-addresses
              key: GATEWAY_ADDR
        - name: GEMINI_MODEL
          valueFrom:
            configMapKeyRef:
              name: app-features
              key: GEMINI_MODEL
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: GEMINI_API_KEY
        resources:
          requests:
            cpu: {{ .Values.resources.standard.requests.cpu }}
            memory: {{ .Values.resources.standard.requests.memory }}
          limits:
            cpu: {{ .Values.resources.standard.limits.cpu }}
            memory: {{ .Values.resources.standard.limits.memory }}
        readinessProbe:
          httpGet:
            path: /_healthz
            port: {{ .Values.ports.assistantservice }}
        livenessProbe:
          httpGet:
            path: /_healthz
            port: {{ .Values.ports.assistantservice }}
---
apiVersion: v1
kind: Service
metadata:
  name: assistantservice
  namespace: {{ .Release.Namespace }}
  labels:
    app: assistantservice
    {{- include "hipstershop.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: assistantservice
  ports:
  - name: http
    port: {{ .Values.ports.assistantservice }}
    targetPort: {{ .Values.ports.assistantservice }}
