apiVersion: apps/v1
kind: Deployment
metadata:
  name: authservice
  namespace: {{ .Release.Namespace }}
  labels:
    app: authservice
    {{- include "hipstershop.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas.authservice }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: {{ .Values.rollingUpdate.maxUnavailable }}
      maxSurge: {{ .Values.rollingUpdate.maxSurge }}
  selector:
    matchLabels:
      app: authservice
  template:
    metadata:
      labels:
        app: authservice
    spec:
      terminationGracePeriodSeconds: 5
      initContainers:
      - name: wait-for-mongodb-primary
        image: {{ .Values.images.mongodb }}
        envFrom:
        - configMapRef:
            name: hipster-config
        env:
        - name: MONGO_USERNAME
          valueFrom:
            secretKeyRef:
              name: mongodb-root
              key: MONGO_ROOT_USERNAME
        - name: MONGO_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mongodb-root
              key: MONGO_ROOT_PASSWORD
        command:
        - bash
        - -c
        - |
          set -e
          check_primary() {
            mongosh "mongodb://$MONGO_USERNAME:$MONGO_PASSWORD@{{ include "hipstershop.mongoHosts" . }}/admin?replicaSet={{ .Values.mongodb.replicaSetName }}&authSource=admin" \
              --quiet --eval "db.hello().isWritablePrimary" | grep -q true || \
            mongosh "mongodb://{{ include "hipstershop.mongoHosts" . }}/admin?replicaSet={{ .Values.mongodb.replicaSetName }}" \
              --quiet --eval "db.hello().isWritablePrimary" | grep -q true
          }
          echo "Waiting for MongoDB replica set primary..."
          until check_primary; do
            echo "No writable primary yet. Retrying in 3s..."
            sleep 3
          done
          echo "MongoDB primary is ready."
      containers:
      - name: server
        image: {{ .Values.images.authservice }}
        ports:
        - containerPort: {{ .Values.ports.authservice }}
        envFrom:
        - configMapRef:
            name: hipster-config
        env:
        - name: MONGO_USERNAME
          valueFrom:
            secretKeyRef:
              name: mongodb-users
              key: AUTH_MONGO_USERNAME
        - name: MONGO_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mongodb-users
              key: AUTH_MONGO_PASSWORD
        - name: MONGO_DATABASE
          valueFrom:
            configMapKeyRef:
              name: mongodb-config
              key: AUTH_DB_NAME
        - name: MONGO_URI
          value: "mongodb://$(MONGO_USERNAME):$(MONGO_PASSWORD)@{{ include "hipstershop.mongoHosts" . }}/{{ .Values.mongodb.users.auth.database }}?replicaSet={{ .Values.mongodb.replicaSetName }}&authSource={{ .Values.mongodb.users.auth.database }}&authMechanism=SCRAM-SHA-256"
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: app-secrets
              key: JWT_SECRET
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: service-ports
              key: AUTHSERVICE_PORT
        readinessProbe:
          initialDelaySeconds: 10
          httpGet:
            path: "/_healthz"
            port: {{ .Values.ports.authservice }}
        livenessProbe:
          initialDelaySeconds: 15
          periodSeconds: 10
          httpGet:
            path: "/_healthz"
            port: {{ .Values.ports.authservice }}
        resources:
          requests:
            cpu: {{ .Values.resources.standard.requests.cpu }}
            memory: {{ .Values.resources.standard.requests.memory }}
          limits:
            cpu: {{ .Values.resources.standard.limits.cpu }}
            memory: {{ .Values.resources.standard.limits.memory }}
---
apiVersion: v1
kind: Service
metadata:
  name: authservice
  namespace: {{ .Release.Namespace }}
  labels:
    app: authservice
    {{- include "hipstershop.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: authservice
  ports:
  - name: http
    port: {{ .Values.ports.authservice }}
    targetPort: {{ .Values.ports.authservice }}
