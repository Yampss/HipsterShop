apiVersion: apps/v1
kind: Deployment
metadata:
  name: adservice
  namespace: {{ .Release.Namespace }}
  labels:
    app: adservice
    {{- include "hipstershop.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas.adservice }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: {{ .Values.rollingUpdate.maxUnavailable }}
      maxSurge: {{ .Values.rollingUpdate.maxSurge }}
  selector:
    matchLabels:
      app: adservice
  template:
    metadata:
      labels:
        app: adservice
    spec:
      terminationGracePeriodSeconds: 5
      containers:
      - name: server
        image: {{ .Values.images.adservice }}
        ports:
        - containerPort: {{ .Values.ports.adservice }}
        envFrom:
        - configMapRef:
            name: hipster-config
        env:
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: service-ports
              key: ADSERVICE_PORT
        resources:
          requests:
            cpu: {{ .Values.resources.adservice.requests.cpu }}
            memory: {{ .Values.resources.adservice.requests.memory }}
          limits:
            cpu: {{ .Values.resources.adservice.limits.cpu }}
            memory: {{ .Values.resources.adservice.limits.memory }}
        readinessProbe:
          initialDelaySeconds: 60
          periodSeconds: 15
          httpGet:
            path: "/_healthz"
            port: {{ .Values.ports.adservice }}
        livenessProbe:
          initialDelaySeconds: 60
          periodSeconds: 15
          httpGet:
            path: "/_healthz"
            port: {{ .Values.ports.adservice }}
        volumeMounts:
        - mountPath: /tmp
          name: tmp-volume
      volumes:
      - name: tmp-volume
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: adservice
  namespace: {{ .Release.Namespace }}
  labels:
    app: adservice
    {{- include "hipstershop.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: adservice
  ports:
  - name: http
    port: {{ .Values.ports.adservice }}
    targetPort: {{ .Values.ports.adservice }}
