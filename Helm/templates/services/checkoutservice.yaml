apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkoutservice
  namespace: {{ .Release.Namespace }}
  labels:
    app: checkoutservice
    {{- include "hipstershop.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas.checkoutservice }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: {{ .Values.rollingUpdate.maxUnavailable }}
      maxSurge: {{ .Values.rollingUpdate.maxSurge }}
  selector:
    matchLabels:
      app: checkoutservice
  template:
    metadata:
      labels:
        app: checkoutservice
    spec:
      containers:
      - name: server
        image: {{ .Values.images.checkoutservice }}
        ports:
        - containerPort: {{ .Values.ports.checkoutservice }}
        readinessProbe:
          httpGet:
            path: "/_healthz"
            port: {{ .Values.ports.checkoutservice }}
        livenessProbe:
          httpGet:
            path: "/_healthz"
            port: {{ .Values.ports.checkoutservice }}
        envFrom:
        - configMapRef:
            name: hipster-config
        env:
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: service-ports
              key: CHECKOUTSERVICE_PORT
        - name: PRODUCT_CATALOG_SERVICE_ADDR
          valueFrom:
            configMapKeyRef:
              name: service-addresses
              key: PRODUCT_CATALOG_SERVICE_ADDR
        - name: SHIPPING_SERVICE_ADDR
          valueFrom:
            configMapKeyRef:
              name: service-addresses
              key: SHIPPING_SERVICE_ADDR
        - name: PAYMENT_SERVICE_ADDR
          valueFrom:
            configMapKeyRef:
              name: service-addresses
              key: PAYMENT_SERVICE_ADDR
        - name: EMAIL_SERVICE_ADDR
          valueFrom:
            configMapKeyRef:
              name: service-addresses
              key: EMAIL_SERVICE_ADDR
        - name: CURRENCY_SERVICE_ADDR
          valueFrom:
            configMapKeyRef:
              name: service-addresses
              key: CURRENCY_SERVICE_ADDR
        - name: CART_SERVICE_ADDR
          valueFrom:
            configMapKeyRef:
              name: service-addresses
              key: CART_SERVICE_ADDR
        - name: MONGO_USERNAME
          valueFrom:
            secretKeyRef:
              name: mongodb-users
              key: ORDER_MONGO_USERNAME
        - name: MONGO_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mongodb-users
              key: ORDER_MONGO_PASSWORD
        - name: MONGO_DATABASE
          valueFrom:
            configMapKeyRef:
              name: mongodb-config
              key: ORDER_DB_NAME
        - name: MONGO_ORDERS_COLLECTION
          valueFrom:
            configMapKeyRef:
              name: mongodb-config
              key: ORDER_ORDERS_COLLECTION
        - name: MONGO_ORDER_EVENTS_COLLECTION
          valueFrom:
            configMapKeyRef:
              name: mongodb-config
              key: ORDER_EVENTS_COLLECTION
        - name: MONGO_URI
          value: "mongodb://$(MONGO_USERNAME):$(MONGO_PASSWORD)@{{ include "hipstershop.mongoHosts" . }}/{{ .Values.mongodb.users.order.database }}?replicaSet={{ .Values.mongodb.replicaSetName }}&authSource={{ .Values.mongodb.users.order.database }}&authMechanism=SCRAM-SHA-256"
        resources:
          requests:
            cpu: {{ .Values.resources.standard.requests.cpu }}
            memory: {{ .Values.resources.standard.requests.memory }}
          limits:
            cpu: {{ .Values.resources.standard.limits.cpu }}
            memory: {{ .Values.resources.standard.limits.memory }}
---
apiVersion: v1
kind: Service
metadata:
  name: checkoutservice
  namespace: {{ .Release.Namespace }}
  labels:
    app: checkoutservice
    {{- include "hipstershop.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: checkoutservice
  ports:
  - name: http
    port: {{ .Values.ports.checkoutservice }}
    targetPort: {{ .Values.ports.checkoutservice }}
