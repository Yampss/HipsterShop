apiVersion: apps/v1
kind: Deployment
metadata:
  name: paymentservice
  namespace: {{ .Release.Namespace }}
  labels:
    app: paymentservice
    {{- include "hipstershop.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas.paymentservice }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: {{ .Values.rollingUpdate.maxUnavailable }}
      maxSurge: {{ .Values.rollingUpdate.maxSurge }}
  selector:
    matchLabels:
      app: paymentservice
  template:
    metadata:
      labels:
        app: paymentservice
    spec:
      terminationGracePeriodSeconds: 5
      containers:
      - name: server
        image: {{ .Values.images.paymentservice }}
        ports:
        - containerPort: {{ .Values.ports.paymentservice }}
        envFrom:
        - configMapRef:
            name: hipster-config
        env:
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: service-ports
              key: PAYMENTSERVICE_PORT
        - name: DISABLE_PROFILER
          valueFrom:
            configMapKeyRef:
              name: app-features
              key: PAYMENT_SERVICE_DISABLE_PROFILER
        - name: MONGO_USERNAME
          valueFrom:
            secretKeyRef:
              name: mongodb-users
              key: PAYMENT_MONGO_USERNAME
        - name: MONGO_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mongodb-users
              key: PAYMENT_MONGO_PASSWORD
        - name: MONGO_DATABASE
          valueFrom:
            configMapKeyRef:
              name: mongodb-config
              key: PAYMENT_DB_NAME
        - name: MONGO_PAYMENTS_COLLECTION
          valueFrom:
            configMapKeyRef:
              name: mongodb-config
              key: PAYMENT_CHARGES_COLLECTION
        - name: MONGO_URI
          value: "mongodb://$(MONGO_USERNAME):$(MONGO_PASSWORD)@{{ include "hipstershop.mongoHosts" . }}/{{ .Values.mongodb.users.payment.database }}?replicaSet={{ .Values.mongodb.replicaSetName }}&authSource={{ .Values.mongodb.users.payment.database }}&authMechanism=SCRAM-SHA-256"
        readinessProbe:
          httpGet:
            path: "/_healthz"
            port: {{ .Values.ports.paymentservice }}
        livenessProbe:
          httpGet:
            path: "/_healthz"
            port: {{ .Values.ports.paymentservice }}
        resources:
          requests:
            cpu: {{ .Values.resources.standard.requests.cpu }}
            memory: {{ .Values.resources.standard.requests.memory }}
          limits:
            cpu: {{ .Values.resources.standard.limits.cpu }}
            memory: {{ .Values.resources.standard.limits.memory }}
---
apiVersion: v1
kind: Service
metadata:
  name: paymentservice
  namespace: {{ .Release.Namespace }}
  labels:
    app: paymentservice
    {{- include "hipstershop.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: paymentservice
  ports:
  - name: http
    port: {{ .Values.ports.paymentservice }}
    targetPort: {{ .Values.ports.paymentservice }}
