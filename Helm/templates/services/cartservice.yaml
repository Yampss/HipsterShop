apiVersion: apps/v1
kind: Deployment
metadata:
  name: cartservice
  namespace: {{ .Release.Namespace }}
  labels:
    app: cartservice
    {{- include "hipstershop.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas.cartservice }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: {{ .Values.rollingUpdate.maxUnavailable }}
      maxSurge: {{ .Values.rollingUpdate.maxSurge }}
  selector:
    matchLabels:
      app: cartservice
  template:
    metadata:
      labels:
        app: cartservice
    spec:
      terminationGracePeriodSeconds: 5
      initContainers:
      - name: wait-for-cart-mongo-auth
        image: {{ .Values.images.mongodb }}
        envFrom:
        - configMapRef:
            name: hipster-config
        env:
        - name: MONGO_USERNAME
          valueFrom:
            secretKeyRef:
              name: mongodb-users
              key: CART_MONGO_USERNAME
        - name: MONGO_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mongodb-users
              key: CART_MONGO_PASSWORD
        command:
        - bash
        - -c
        - |
          set -e
          echo "Waiting for cart Mongo auth to become ready..."
          until mongosh "mongodb://$MONGO_USERNAME:$MONGO_PASSWORD@{{ include "hipstershop.mongoHosts" . }}/{{ .Values.mongodb.users.cart.database }}?replicaSet={{ .Values.mongodb.replicaSetName }}&authSource={{ .Values.mongodb.users.cart.database }}&authMechanism=SCRAM-SHA-256" --quiet --eval "db.adminCommand('ping').ok" | grep -q 1; do
            echo "Cart Mongo auth not ready yet. Retrying in 3s..."
            sleep 3
          done
          echo "Cart Mongo auth ready."
      containers:
      - name: server
        image: {{ .Values.images.cartservice }}
        ports:
        - containerPort: {{ .Values.ports.cartservice }}
        envFrom:
        - configMapRef:
            name: hipster-config
        env:
        - name: OTEL_SDK_DISABLED
          value: "true"
        - name: DISABLE_TRACING
          value: "1"
        - name: ASPNETCORE_HTTP_PORTS
          value: {{ .Values.ports.cartservice | quote }}
        - name: MONGO_USERNAME
          valueFrom:
            secretKeyRef:
              name: mongodb-users
              key: CART_MONGO_USERNAME
        - name: MONGO_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mongodb-users
              key: CART_MONGO_PASSWORD
        - name: MONGO_DATABASE
          valueFrom:
            configMapKeyRef:
              name: mongodb-config
              key: CART_DB_NAME
        - name: MONGO_URI
          value: "mongodb://$(MONGO_USERNAME):$(MONGO_PASSWORD)@{{ include "hipstershop.mongoHosts" . }}/{{ .Values.mongodb.users.cart.database }}?replicaSet={{ .Values.mongodb.replicaSetName }}&authSource={{ .Values.mongodb.users.cart.database }}&authMechanism=SCRAM-SHA-256"
        resources:
          requests:
            cpu: {{ .Values.resources.cartservice.requests.cpu }}
            memory: {{ .Values.resources.cartservice.requests.memory }}
          limits:
            cpu: {{ .Values.resources.cartservice.limits.cpu }}
            memory: {{ .Values.resources.cartservice.limits.memory }}
        readinessProbe:
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 6
          tcpSocket:
            port: {{ .Values.ports.cartservice }}
        livenessProbe:
          initialDelaySeconds: 60
          periodSeconds: 10
          failureThreshold: 6
          tcpSocket:
            port: {{ .Values.ports.cartservice }}
---
apiVersion: v1
kind: Service
metadata:
  name: cartservice
  namespace: {{ .Release.Namespace }}
  labels:
    app: cartservice
    {{- include "hipstershop.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: cartservice
  ports:
  - name: http
    port: {{ .Values.ports.cartservice }}
    targetPort: {{ .Values.ports.cartservice }}
