apiVersion: apps/v1
kind: Deployment
metadata:
  name: productcatalogservice
  namespace: {{ .Release.Namespace }}
  labels:
    app: productcatalogservice
    {{- include "hipstershop.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas.productcatalogservice }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: {{ .Values.rollingUpdate.maxUnavailable }}
      maxSurge: {{ .Values.rollingUpdate.maxSurge }}
  selector:
    matchLabels:
      app: productcatalogservice
  template:
    metadata:
      labels:
        app: productcatalogservice
    spec:
      terminationGracePeriodSeconds: 5
      containers:
      - name: server
        image: {{ .Values.images.productcatalogservice }}
        ports:
        - containerPort: {{ .Values.ports.productcatalogservice }}
        envFrom:
        - configMapRef:
            name: hipster-config
        env:
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: service-ports
              key: PRODUCTCATALOG_PORT
        - name: MONGO_USERNAME
          valueFrom:
            secretKeyRef:
              name: mongodb-users
              key: CATALOG_MONGO_USERNAME
        - name: MONGO_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mongodb-users
              key: CATALOG_MONGO_PASSWORD
        - name: MONGO_DATABASE
          valueFrom:
            configMapKeyRef:
              name: mongodb-config
              key: CATALOG_DB_NAME
        - name: MONGO_PRODUCTS_COLLECTION
          valueFrom:
            configMapKeyRef:
              name: mongodb-config
              key: CATALOG_PRODUCTS_COLLECTION
        - name: PRODUCTS_FALLBACK_LOCAL
          value: "true"
        - name: MONGO_URI
          value: "mongodb://$(MONGO_USERNAME):$(MONGO_PASSWORD)@{{ include "hipstershop.mongoHosts" . }}/{{ .Values.mongodb.users.catalog.database }}?replicaSet={{ .Values.mongodb.replicaSetName }}&authSource={{ .Values.mongodb.users.catalog.database }}&authMechanism=SCRAM-SHA-256"
        readinessProbe:
          initialDelaySeconds: 20
          periodSeconds: 5
          httpGet:
            path: "/_healthz"
            port: {{ .Values.ports.productcatalogservice }}
        livenessProbe:
          initialDelaySeconds: 40
          failureThreshold: 6
          periodSeconds: 5
          httpGet:
            path: "/_healthz"
            port: {{ .Values.ports.productcatalogservice }}
        resources:
          requests:
            cpu: {{ .Values.resources.standard.requests.cpu }}
            memory: {{ .Values.resources.standard.requests.memory }}
          limits:
            cpu: {{ .Values.resources.standard.limits.cpu }}
            memory: {{ .Values.resources.standard.limits.memory }}
---
apiVersion: v1
kind: Service
metadata:
  name: productcatalogservice
  namespace: {{ .Release.Namespace }}
  labels:
    app: productcatalogservice
    {{- include "hipstershop.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: productcatalogservice
  ports:
  - name: http
    port: {{ .Values.ports.productcatalogservice }}
    targetPort: {{ .Values.ports.productcatalogservice }}
