apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: {{ .Release.Namespace }}
  labels:
    app: mongodb
    {{- include "hipstershop.labels" . | nindent 4 }}
spec:
  # Must reference the Headless Service for stable Pod DNS
  serviceName: mongo-headless
  replicas: {{ .Values.mongodb.replicas }}
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      terminationGracePeriodSeconds: 30
      containers:
      - name: mongodb
        image: {{ .Values.images.mongodb }}
        # --replSet rs0  : enables replica-set mode
        # --bind_ip_all  : listens on all network interfaces (needed for inter-pod comms)
        command: ["mongod", "--replSet", {{ .Values.mongodb.replicaSetName | quote }}, "--bind_ip_all"]
        ports:
        - containerPort: 27017
          name: mongo
        env:
        - name: MONGO_INITDB_ROOT_USERNAME
          valueFrom:
            secretKeyRef:
              name: mongodb-root
              key: MONGO_ROOT_USERNAME
        - name: MONGO_INITDB_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mongodb-root
              key: MONGO_ROOT_PASSWORD
        - name: MONGO_INITDB_DATABASE
          value: {{ .Values.mongodb.initDatabase | quote }}
        volumeMounts:
        - name: mongo-data
          mountPath: /data/db
        readinessProbe:
          exec:
            command:
            - mongosh
            - --eval
            - "db.adminCommand('ping')"
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 5
        livenessProbe:
          exec:
            command:
            - mongosh
            - --eval
            - "db.adminCommand('ping')"
          initialDelaySeconds: 30
          periodSeconds: 20
          timeoutSeconds: 5
        resources:
          requests:
            cpu: {{ .Values.resources.mongodb.requests.cpu }}
            memory: {{ .Values.resources.mongodb.requests.memory }}
          limits:
            cpu: {{ .Values.resources.mongodb.limits.cpu }}
            memory: {{ .Values.resources.mongodb.limits.memory }}
  # volumeClaimTemplates: Kubernetes creates a PVC per Pod (mongo-data-0, 1, 2)
  # Each PVC is backed by NFS StorageClass → persistent even after Pod restarts
  volumeClaimTemplates:
  - metadata:
      name: mongo-data
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: {{ .Values.mongodb.storageClass | quote }}
      resources:
        requests:
          storage: {{ .Values.mongodb.storageSize }}
