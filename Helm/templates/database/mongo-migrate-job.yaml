apiVersion: batch/v1
kind: Job
metadata:
  name: mongo-migrate-shopdb-data
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "hipstershop.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install
    "helm.sh/hook-weight": "3"
    "helm.sh/hook-delete-policy": hook-succeeded
spec:
  backoffLimit: 10
  template:
    spec:
      restartPolicy: OnFailure
      containers:
      - name: mongo-migrate-shopdb-data
        image: {{ .Values.images.mongodb }}
        env:
        - name: MONGO_ROOT_USERNAME
          valueFrom:
            secretKeyRef:
              name: mongodb-root
              key: MONGO_ROOT_USERNAME
        - name: MONGO_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mongodb-root
              key: MONGO_ROOT_PASSWORD
        command:
        - bash
        - -c
        - |
          set -e

          check_primary() {
            mongosh "mongodb://$MONGO_ROOT_USERNAME:$MONGO_ROOT_PASSWORD@{{ include "hipstershop.mongoHosts" . }}/admin?replicaSet={{ .Values.mongodb.replicaSetName }}&authSource=admin" --quiet --eval "db.hello().isWritablePrimary" | grep -q true
          }

          echo "Waiting for writable MongoDB primary for migration..."
          until check_primary; do
            echo "No writable primary yet. Retrying in 3s..."
            sleep 3
          done

          mongosh "mongodb://$MONGO_ROOT_USERNAME:$MONGO_ROOT_PASSWORD@{{ include "hipstershop.mongoHosts" . }}/admin?replicaSet={{ .Values.mongodb.replicaSetName }}&authSource=admin" --eval '
            function migrateCollection(sourceDbName, sourceCollName, targetDbName, targetCollName, keyField) {
              var source = db.getSiblingDB(sourceDbName).getCollection(sourceCollName);
              var target = db.getSiblingDB(targetDbName).getCollection(targetCollName);
              var docs = source.find({}).toArray();
              docs.forEach(function(doc) {
                var query = {};
                query[keyField] = doc[keyField];
                target.updateOne(query, { $set: doc }, { upsert: true });
              });
              print("Migrated " + docs.length + " docs from " + sourceDbName + "." + sourceCollName + " to " + targetDbName + "." + targetCollName);
            }

            migrateCollection("shopdb", "users", "auth_db", "users", "email");
            migrateCollection("shopdb", "carts", "cart_db", "carts", "_id");
          '
