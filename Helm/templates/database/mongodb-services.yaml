# ── Headless Service ──────────────────────────────────────────────────────────
# clusterIP: None means DNS returns individual Pod IPs (not a virtual IP).
# Required by StatefulSet for stable Pod DNS:
#   mongodb-0.mongo-headless.<namespace>.svc.cluster.local
#   mongodb-1.mongo-headless.<namespace>.svc.cluster.local
#   mongodb-2.mongo-headless.<namespace>.svc.cluster.local
apiVersion: v1
kind: Service
metadata:
  name: mongo-headless
  namespace: {{ .Release.Namespace }}
  labels:
    app: mongodb
    {{- include "hipstershop.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    app: mongodb
  ports:
  - name: mongo
    port: 27017
    targetPort: 27017

---
# ── ClusterIP Service ─────────────────────────────────────────────────────────
# Standard ClusterIP — clients can reach any MongoDB pod via a stable VIP.
# The replica set driver handles routing to the PRIMARY automatically.
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: {{ .Release.Namespace }}
  labels:
    app: mongodb
    {{- include "hipstershop.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app: mongodb
  ports:
  - name: mongo
    port: 27017
    targetPort: 27017
