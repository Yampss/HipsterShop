# ── Secret: app-secrets (JWT + Gemini API Key) ────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "hipstershop.labels" . | nindent 4 }}
type: Opaque
stringData:
  JWT_SECRET: {{ .Values.secrets.jwtSecret | quote }}
  GEMINI_API_KEY: {{ .Values.secrets.geminiApiKey | quote }}

---
# ── Secret: mongodb-root (Root/Admin credentials) ─────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-root
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "hipstershop.labels" . | nindent 4 }}
type: Opaque
stringData:
  MONGO_ROOT_USERNAME: {{ .Values.mongodb.rootUsername | quote }}
  MONGO_ROOT_PASSWORD: {{ .Values.mongodb.rootPassword | quote }}

---
# ── Secret: mongodb-users (Per-service DB users) ──────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: mongodb-users
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "hipstershop.labels" . | nindent 4 }}
type: Opaque
stringData:
  AUTH_MONGO_USERNAME: {{ .Values.mongodb.users.auth.username | quote }}
  AUTH_MONGO_PASSWORD: {{ .Values.mongodb.users.auth.password | quote }}
  CART_MONGO_USERNAME: {{ .Values.mongodb.users.cart.username | quote }}
  CART_MONGO_PASSWORD: {{ .Values.mongodb.users.cart.password | quote }}
  CATALOG_MONGO_USERNAME: {{ .Values.mongodb.users.catalog.username | quote }}
  CATALOG_MONGO_PASSWORD: {{ .Values.mongodb.users.catalog.password | quote }}
  ORDER_MONGO_USERNAME: {{ .Values.mongodb.users.order.username | quote }}
  ORDER_MONGO_PASSWORD: {{ .Values.mongodb.users.order.password | quote }}
  PAYMENT_MONGO_USERNAME: {{ .Values.mongodb.users.payment.username | quote }}
  PAYMENT_MONGO_PASSWORD: {{ .Values.mongodb.users.payment.password | quote }}
  NOTIFICATION_MONGO_USERNAME: {{ .Values.mongodb.users.notification.username | quote }}
  NOTIFICATION_MONGO_PASSWORD: {{ .Values.mongodb.users.notification.password | quote }}
  ANALYTICS_MONGO_USERNAME: {{ .Values.mongodb.users.analytics.username | quote }}
  ANALYTICS_MONGO_PASSWORD: {{ .Values.mongodb.users.analytics.password | quote }}
