# GatewayClass — defines the controller that manages Gateway resources.
# controllerName must match the kgateway controller deployed in kube-system.
# This is a cluster-scoped resource (no namespace field needed).
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: {{ .Values.gateway.gatewayClassName }}
  labels:
    {{- include "hipstershop.labels" . | nindent 4 }}
spec:
  controllerName: kgateway.dev/kgateway
