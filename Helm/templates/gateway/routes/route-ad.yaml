apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ad-route
  namespace: {{ .Release.Namespace }}
  labels:
    app: adservice
    {{- include "hipstershop.labels" . | nindent 4 }}
spec:
  parentRefs:
  - name: {{ .Values.gateway.name }}
  rules:
  - matches:
    - path:
        type: Exact
        value: /api/ads
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplaceFullPath
          replaceFullPath: /ads
    backendRefs:
    - name: adservice
      port: {{ .Values.ports.adservice }}
