# Frontend HTTPRoute — catches all user-facing paths and routes to the frontend service.
# No URL rewriting needed — paths are forwarded as-is.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frontend-route
  namespace: {{ .Release.Namespace }}
  labels:
    app: frontend
    {{- include "hipstershop.labels" . | nindent 4 }}
spec:
  parentRefs:
  - name: {{ .Values.gateway.name }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /static/
    backendRefs:
    - name: frontend
      port: {{ .Values.ports.frontendSvc }}
  - matches:
    - path:
        type: PathPrefix
        value: /resources/
    backendRefs:
    - name: frontend
      port: {{ .Values.ports.frontendSvc }}
  - matches:
    - path:
        type: PathPrefix
        value: /architecture
    backendRefs:
    - name: frontend
      port: {{ .Values.ports.frontendSvc }}
  - matches:
    - path:
        type: Exact
        value: /_healthz
    backendRefs:
    - name: frontend
      port: {{ .Values.ports.frontendSvc }}
  - matches:
    - path:
        type: PathPrefix
        value: /product
    backendRefs:
    - name: frontend
      port: {{ .Values.ports.frontendSvc }}
  - matches:
    - path:
        type: PathPrefix
        value: /cart
    backendRefs:
    - name: frontend
      port: {{ .Values.ports.frontendSvc }}
  - matches:
    - path:
        type: Exact
        value: /setCurrency
    backendRefs:
    - name: frontend
      port: {{ .Values.ports.frontendSvc }}
  - matches:
    - path:
        type: Exact
        value: /login
    backendRefs:
    - name: frontend
      port: {{ .Values.ports.frontendSvc }}
  - matches:
    - path:
        type: Exact
        value: /signup
    backendRefs:
    - name: frontend
      port: {{ .Values.ports.frontendSvc }}
  - matches:
    - path:
        type: Exact
        value: /logout
    backendRefs:
    - name: frontend
      port: {{ .Values.ports.frontendSvc }}
  - matches:
    - path:
        type: Exact
        value: /
    backendRefs:
    - name: frontend
      port: {{ .Values.ports.frontendSvc }}
