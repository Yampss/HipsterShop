# Auth HTTPRoute — routes /api/auth/* to authservice with path rewriting.
# URLRewrite filter strips the /api/auth prefix before forwarding.
# Example: /api/auth/login → /login on authservice:8081
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: auth-route
  namespace: {{ .Release.Namespace }}
  labels:
    app: authservice
    {{- include "hipstershop.labels" . | nindent 4 }}
spec:
  parentRefs:
  - name: {{ .Values.gateway.name }}
  rules:
  - matches:
    - path:
        type: Exact
        value: /api/auth/login
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplaceFullPath
          replaceFullPath: /login
    backendRefs:
    - name: authservice
      port: {{ .Values.ports.authservice }}
  - matches:
    - path:
        type: Exact
        value: /api/auth/signup
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplaceFullPath
          replaceFullPath: /signup
    backendRefs:
    - name: authservice
      port: {{ .Values.ports.authservice }}
  - matches:
    - path:
        type: Exact
        value: /api/auth/logout
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplaceFullPath
          replaceFullPath: /logout
    backendRefs:
    - name: authservice
      port: {{ .Values.ports.authservice }}
  - matches:
    - path:
        type: Exact
        value: /api/auth/me
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplaceFullPath
          replaceFullPath: /me
    backendRefs:
    - name: authservice
      port: {{ .Values.ports.authservice }}
