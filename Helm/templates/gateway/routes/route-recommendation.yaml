apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: recommendation-route
  namespace: {{ .Release.Namespace }}
  labels:
    app: recommendationservice
    {{- include "hipstershop.labels" . | nindent 4 }}
spec:
  parentRefs:
  - name: {{ .Values.gateway.name }}
  rules:
  - matches:
    - path:
        type: Exact
        value: /api/recommendations
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplaceFullPath
          replaceFullPath: /recommendations
    backendRefs:
    - name: recommendationservice
      port: {{ .Values.ports.recommendationservice }}
