# Currency HTTPRoute — two rules with URL rewrites
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: currency-route
  namespace: {{ .Release.Namespace }}
  labels:
    app: currencyservice
    {{- include "hipstershop.labels" . | nindent 4 }}
spec:
  parentRefs:
  - name: {{ .Values.gateway.name }}
  rules:
  - matches:
    - path:
        type: Exact
        value: /api/currency/currencies
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplaceFullPath
          replaceFullPath: /currencies
    backendRefs:
    - name: currencyservice
      port: {{ .Values.ports.currencyservice }}
  - matches:
    - path:
        type: Exact
        value: /api/currency/convert
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplaceFullPath
          replaceFullPath: /convert
    backendRefs:
    - name: currencyservice
      port: {{ .Values.ports.currencyservice }}
