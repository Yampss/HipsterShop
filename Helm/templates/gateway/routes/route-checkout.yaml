# Checkout HTTPRoute — /api/checkout → /checkout on checkoutservice:5050
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: checkout-route
  namespace: {{ .Release.Namespace }}
  labels:
    app: checkoutservice
    {{- include "hipstershop.labels" . | nindent 4 }}
spec:
  parentRefs:
  - name: {{ .Values.gateway.name }}
  rules:
  - matches:
    - path:
        type: Exact
        value: /api/checkout
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplaceFullPath
          replaceFullPath: /checkout
    backendRefs:
    - name: checkoutservice
      port: {{ .Values.ports.checkoutservice }}
