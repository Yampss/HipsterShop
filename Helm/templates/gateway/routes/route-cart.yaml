# Cart HTTPRoute — strips /api prefix: /api/cart → /cart on cartservice:7070
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: cart-route
  namespace: {{ .Release.Namespace }}
  labels:
    app: cartservice
    {{- include "hipstershop.labels" . | nindent 4 }}
spec:
  parentRefs:
  - name: {{ .Values.gateway.name }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /api/cart
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /cart
    backendRefs:
    - name: cartservice
      port: {{ .Values.ports.cartservice }}
