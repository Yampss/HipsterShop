apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: shipping-route
  namespace: {{ .Release.Namespace }}
  labels:
    app: shippingservice
    {{- include "hipstershop.labels" . | nindent 4 }}
spec:
  parentRefs:
  - name: {{ .Values.gateway.name }}
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /api/shipping
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplacePrefixMatch
          replacePrefixMatch: /
    backendRefs:
    - name: shippingservice
      port: {{ .Values.ports.shippingservice }}
