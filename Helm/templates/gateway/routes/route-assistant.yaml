# No URLRewrite — request forwarded directly to assistantservice as-is
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: assistant-route
  namespace: {{ .Release.Namespace }}
  labels:
    app: assistantservice
    {{- include "hipstershop.labels" . | nindent 4 }}
spec:
  parentRefs:
  - name: {{ .Values.gateway.name }}
  rules:
  - matches:
    - path:
        type: Exact
        value: /api/assistant/chat
    backendRefs:
    - name: assistantservice
      port: {{ .Values.ports.assistantservice }}
