apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: email-route
  namespace: {{ .Release.Namespace }}
  labels:
    app: emailservice
    {{- include "hipstershop.labels" . | nindent 4 }}
spec:
  parentRefs:
  - name: {{ .Values.gateway.name }}
  rules:
  - matches:
    - path:
        type: Exact
        value: /api/email/send-confirmation
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplaceFullPath
          replaceFullPath: /send-confirmation
    backendRefs:
    - name: emailservice
      port: {{ .Values.ports.emailservice }}
