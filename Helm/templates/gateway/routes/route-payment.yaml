apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: payment-route
  namespace: {{ .Release.Namespace }}
  labels:
    app: paymentservice
    {{- include "hipstershop.labels" . | nindent 4 }}
spec:
  parentRefs:
  - name: {{ .Values.gateway.name }}
  rules:
  - matches:
    - path:
        type: Exact
        value: /api/payment/charge
    filters:
    - type: URLRewrite
      urlRewrite:
        path:
          type: ReplaceFullPath
          replaceFullPath: /charge
    backendRefs:
    - name: paymentservice
      port: {{ .Values.ports.paymentservice }}
