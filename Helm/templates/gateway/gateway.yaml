# Gateway — creates an Envoy proxy instance that listens on port 80.
# kgateway provisions and manages the underlying Envoy deployment automatically.
# HAProxy sits in front and forwards traffic to this Gateway's Service.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .Values.gateway.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: hipstershop
    {{- include "hipstershop.labels" . | nindent 4 }}
spec:
  gatewayClassName: {{ .Values.gateway.gatewayClassName }}
  listeners:
  - name: http
    protocol: HTTP
    port: {{ .Values.gateway.port }}
    allowedRoutes:
      namespaces:
        from: Same
