{{- $ns := .Values.global.namespaces -}}
{{- $ports := .Values.global.ports -}}
{{- $gw := .Values.global.gateway -}}
# ── Frontend Route (cross-namespace) ─────────────────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  namespace: {{ $ns.backend }}
  name: frontend-route
  labels:
    app: frontend
spec:
  parentRefs:
    - name: {{ $gw.name }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /static/
      backendRefs:
        - name: frontend
          namespace: {{ $ns.frontend }}
          port: {{ $ports.frontendSvc }}
    - matches:
        - path:
            type: Exact
            value: /_healthz
      backendRefs:
        - name: frontend
          namespace: {{ $ns.frontend }}
          port: {{ $ports.frontendSvc }}
    - matches:
        - path:
            type: PathPrefix
            value: /product
      backendRefs:
        - name: frontend
          namespace: {{ $ns.frontend }}
          port: {{ $ports.frontendSvc }}
    - matches:
        - path:
            type: PathPrefix
            value: /cart
      backendRefs:
        - name: frontend
          namespace: {{ $ns.frontend }}
          port: {{ $ports.frontendSvc }}
    - matches:
        - path:
            type: Exact
            value: /setCurrency
      backendRefs:
        - name: frontend
          namespace: {{ $ns.frontend }}
          port: {{ $ports.frontendSvc }}
    - matches:
        - path:
            type: Exact
            value: /login
      backendRefs:
        - name: frontend
          namespace: {{ $ns.frontend }}
          port: {{ $ports.frontendSvc }}
    - matches:
        - path:
            type: Exact
            value: /signup
      backendRefs:
        - name: frontend
          namespace: {{ $ns.frontend }}
          port: {{ $ports.frontendSvc }}
    - matches:
        - path:
            type: Exact
            value: /logout
      backendRefs:
        - name: frontend
          namespace: {{ $ns.frontend }}
          port: {{ $ports.frontendSvc }}
    - matches:
        - path:
            type: Exact
            value: /
      backendRefs:
        - name: frontend
          namespace: {{ $ns.frontend }}
          port: {{ $ports.frontendSvc }}
---
# ── Backend Service Routes ───────────────────────────────────────
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  namespace: {{ $ns.backend }}
  name: ad-route
  labels:
    app: adservice
spec:
  parentRefs:
    - name: {{ $gw.name }}
  rules:
    - matches:
        - path:
            type: Exact
            value: /api/ads
      filters:
        - type: URLRewrite
          urlRewrite:
            path:
              type: ReplaceFullPath
              replaceFullPath: /ads
      backendRefs:
        - name: adservice
          port: {{ $ports.adservice }}
---
