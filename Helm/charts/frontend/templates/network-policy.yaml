# ── Default deny all traffic in hipster-frontend ──────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: {{ .Values.global.namespaces.frontend }}
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress

---
# ── Allow required frontend traffic ──────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frontend-allow
  namespace: {{ .Values.global.namespaces.frontend }}
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow from hipster-backend (gateway envoy proxy routes to frontend)
  - from:
    - namespaceSelector:
        matchLabels:
          name: {{ .Values.global.namespaces.backend }}
  # Allow within hipster-frontend (loadgenerator -> frontend)
  - from:
    - podSelector: {}
  egress:
  # Allow to hipster-backend (frontend -> gateway API)
  - to:
    - namespaceSelector:
        matchLabels:
          name: {{ .Values.global.namespaces.backend }}
  # Allow within hipster-frontend
  - to:
    - podSelector: {}
  # DNS resolution
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
