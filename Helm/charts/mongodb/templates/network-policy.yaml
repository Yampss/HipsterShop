# ── Default deny all traffic in hipster-database ─────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: {{ .Values.global.namespaces.database }}
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress

---
# ── Allow required database traffic ──────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: database-allow
  namespace: {{ .Values.global.namespaces.database }}
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow from hipster-backend on MongoDB port
  - from:
    - namespaceSelector:
        matchLabels:
          name: {{ .Values.global.namespaces.backend }}
    ports:
    - protocol: TCP
      port: 27017
  # Allow within hipster-database (replica set comms + init/seed/migrate jobs)
  - from:
    - podSelector: {}
  egress:
  # Allow within hipster-database (MongoDB replica set communication)
  - to:
    - podSelector: {}
  # DNS resolution
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
