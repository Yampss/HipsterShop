apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: {{ .Values.global.namespaces.backend }}
  name: checkoutservice
  labels:
    app: checkoutservice
spec:
  replicas: {{ .Values.global.replicas.checkoutservice }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: {{ .Values.global.rollingUpdate.maxUnavailable }}
      maxSurge: {{ .Values.global.rollingUpdate.maxSurge }}
  selector:
    matchLabels:
      app: checkoutservice
  template:
    metadata:
      labels:
        app: checkoutservice
        tier: backend
    spec:
      containers:
        - name: server
          image: {{ .Values.global.images.checkoutservice }}
          ports:
          - containerPort: {{ .Values.global.ports.checkoutservice }}
          readinessProbe:
            httpGet:
              path: "/_healthz"
              port: {{ .Values.global.ports.checkoutservice }}
          livenessProbe:
            httpGet:
              path: "/_healthz"
              port: {{ .Values.global.ports.checkoutservice }}
          envFrom:
            - configMapRef:
                name: hipster-config
          env:
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: service-ports
                  key: CHECKOUTSERVICE_PORT
            - name: PRODUCT_CATALOG_SERVICE_ADDR
              valueFrom:
                configMapKeyRef:
                  name: service-addresses
                  key: PRODUCT_CATALOG_SERVICE_ADDR
            - name: SHIPPING_SERVICE_ADDR
              valueFrom:
                configMapKeyRef:
                  name: service-addresses
                  key: SHIPPING_SERVICE_ADDR
            - name: PAYMENT_SERVICE_ADDR
              valueFrom:
                configMapKeyRef:
                  name: service-addresses
                  key: PAYMENT_SERVICE_ADDR
            - name: EMAIL_SERVICE_ADDR
              valueFrom:
                configMapKeyRef:
                  name: service-addresses
                  key: EMAIL_SERVICE_ADDR
            - name: CURRENCY_SERVICE_ADDR
              valueFrom:
                configMapKeyRef:
                  name: service-addresses
                  key: CURRENCY_SERVICE_ADDR
            - name: CART_SERVICE_ADDR
              valueFrom:
                configMapKeyRef:
                  name: service-addresses
                  key: CART_SERVICE_ADDR
            - name: MONGO_USERNAME
              valueFrom:
                secretKeyRef:
                  name: mongodb-users
                  key: ORDER_MONGO_USERNAME
            - name: MONGO_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mongodb-users
                  key: ORDER_MONGO_PASSWORD
            - name: MONGO_DATABASE
              valueFrom:
                configMapKeyRef:
                  name: mongodb-config
                  key: ORDER_DB_NAME
            - name: MONGO_ORDERS_COLLECTION
              valueFrom:
                configMapKeyRef:
                  name: mongodb-config
                  key: ORDER_ORDERS_COLLECTION
            - name: MONGO_ORDER_EVENTS_COLLECTION
              valueFrom:
                configMapKeyRef:
                  name: mongodb-config
                  key: ORDER_EVENTS_COLLECTION
            - name: MONGO_URI
              value: "mongodb://$(MONGO_USERNAME):$(MONGO_PASSWORD)@mongodb-0.mongo-headless.{{ .Values.global.namespaces.database }}.svc.cluster.local:27017,mongodb-1.mongo-headless.{{ .Values.global.namespaces.database }}.svc.cluster.local:27017,mongodb-2.mongo-headless.{{ .Values.global.namespaces.database }}.svc.cluster.local:27017/{{ .Values.global.mongodb.users.order.database }}?replicaSet=rs0&authSource={{ .Values.global.mongodb.users.order.database }}&authMechanism=SCRAM-SHA-256"
          resources:
            requests:
              cpu: {{ .Values.global.resources.standard.requests.cpu }}
              memory: {{ .Values.global.resources.standard.requests.memory }}
            limits:
              cpu: {{ .Values.global.resources.standard.limits.cpu }}
              memory: {{ .Values.global.resources.standard.limits.memory }}
