apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: {{ .Values.global.namespaces.backend }}
  name: recommendationservice
  labels:
    app: recommendationservice
spec:
  replicas: {{ .Values.global.replicas.recommendationservice }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: {{ .Values.global.rollingUpdate.maxUnavailable }}
      maxSurge: {{ .Values.global.rollingUpdate.maxSurge }}
  selector:
    matchLabels:
      app: recommendationservice
  template:
    metadata:
      labels:
        app: recommendationservice
        tier: backend
    spec:
      terminationGracePeriodSeconds: 5
      containers:
      - name: server
        image: {{ .Values.global.images.recommendationservice }}
        ports:
        - containerPort: {{ .Values.global.ports.recommendationservice }}
        readinessProbe:
          periodSeconds: 5
          httpGet:
            path: "/_healthz"
            port: {{ .Values.global.ports.recommendationservice }}
        livenessProbe:
          periodSeconds: 5
          httpGet:
            path: "/_healthz"
            port: {{ .Values.global.ports.recommendationservice }}
        envFrom:
        - configMapRef:
            name: hipster-config
        env:
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: service-ports
              key: RECOMMENDATIONSERVICE_PORT
        - name: PRODUCT_CATALOG_SERVICE_ADDR
          valueFrom:
            configMapKeyRef:
              name: service-addresses
              key: PRODUCT_CATALOG_SERVICE_ADDR
        - name: MONGO_USERNAME
          valueFrom:
            secretKeyRef:
              name: mongodb-users
              key: ANALYTICS_MONGO_USERNAME
        - name: MONGO_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mongodb-users
              key: ANALYTICS_MONGO_PASSWORD
        - name: MONGO_DATABASE
          valueFrom:
            configMapKeyRef:
              name: mongodb-config
              key: ANALYTICS_DB_NAME
        - name: MONGO_RECOMMENDATIONS_COLLECTION
          valueFrom:
            configMapKeyRef:
              name: mongodb-config
              key: ANALYTICS_RECOMMENDATIONS_COLLECTION
        - name: MONGO_URI
          value: "mongodb://$(MONGO_USERNAME):$(MONGO_PASSWORD)@mongodb-0.mongo-headless.{{ .Values.global.namespaces.database }}.svc.cluster.local:27017,mongodb-1.mongo-headless.{{ .Values.global.namespaces.database }}.svc.cluster.local:27017,mongodb-2.mongo-headless.{{ .Values.global.namespaces.database }}.svc.cluster.local:27017/{{ .Values.global.mongodb.users.analytics.database }}?replicaSet=rs0&authSource={{ .Values.global.mongodb.users.analytics.database }}&authMechanism=SCRAM-SHA-256"
        resources:
          requests:
            cpu: {{ .Values.global.resources.recommendation.requests.cpu }}
            memory: {{ .Values.global.resources.recommendation.requests.memory }}
          limits:
            cpu: {{ .Values.global.resources.recommendation.limits.cpu }}
            memory: {{ .Values.global.resources.recommendation.limits.memory }}
